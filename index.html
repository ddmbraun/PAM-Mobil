function _wpMobRenderFotos(bericht,grid){
  grid.innerHTML='';
  if(!bericht.fotos||!bericht.fotos.length){
    const h=document.createElement('div');h.style.cssText='grid-column:1/-1;font-size:12px;color:var(--text2);padding:8px 14px;';
    h.textContent='Noch keine Fotos.';grid.appendChild(h);return;
  }
  bericht.fotos.forEach((f,fi)=>{
    const cell=document.createElement('div');
    cell.style.cssText='position:relative;border:2px solid '+(f.inReport?'#1a7a3c':'var(--border)')+';border-radius:8px;overflow:hidden;background:var(--bg3);aspect-ratio:1;';
    // Einfachklick = PDF-Auswahl, Doppeltap = öffnen
    let _tapTimer=null;
    cell.onclick=()=>{
      if(_tapTimer){clearTimeout(_tapTimer);_tapTimer=null;_wpMobOpenFoto(bericht,fi);return;}
      _tapTimer=setTimeout(()=>{
        _tapTimer=null;
        f.inReport=!f.inReport;
        cell.style.borderColor=f.inReport?'#1a7a3c':'var(--border)';
        const badge=cell.querySelector('.wpmb');if(badge)badge.style.display=f.inReport?'flex':'none';
        scheduleSave();
      },280);
    };
    if(f.localUrl&&(f.localUrl.startsWith('data:')||f.localUrl.startsWith('blob:'))){
      // Bereits im Speicher (data-URL = persistent, blob-URL = aktuelle Session)
      const img=document.createElement('img');img.src=f.localUrl;img.style.cssText='width:100%;height:100%;object-fit:cover;pointer-events:none;';cell.appendChild(img);
    }else if(f.localKey&&!f.driveId){
      // Aus IndexedDB laden (überlebt Seiten-Neuladen)
      const img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;pointer-events:none;';
      _mobPhotoGet(f.localKey).then(dataUrl=>{if(dataUrl){f.localUrl=dataUrl;img.src=dataUrl;}});
      cell.appendChild(img);
    }else if(f.driveId){
      const img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;pointer-events:none;';
      // Gecachte thumbnailLink nutzen (kein API-Call nötig) – sonst live holen und cachen.
      if(f.thumbnail){
        img.src=f.thumbnail;
      }else{
        _mobFetchThumb(f.driveId).then(u=>{if(u){img.src=u;f.thumbnail=u;scheduleSave();}});
      }
      cell.appendChild(img);
    }
    // Upload-Overlay für Fotos die noch hochgeladen werden
    if(f._uploading){
      const ov=document.createElement('div');ov.className='foto-upload-overlay';
      ov.innerHTML='<span class="up-icon">⬆</span><span class="up-lbl">lädt hoch…</span>';
      cell.appendChild(ov);
    }
    const badge=document.createElement('div');badge.className='wpmb';
    badge.style.cssText='display:'+(f.inReport?'flex':'none')+';position:absolute;top:3px;right:3px;background:#1a7a3c;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;align-items:center;justify-content:center;font-weight:700;';
    badge.textContent='✓';
    const delB=document.createElement('button');delB.type='button';delB.textContent='✕';
    delB.style.cssText='position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;padding:0;line-height:20px;text-align:center;z-index:3;';
    delB.onclick=(e)=>{e.stopPropagation();bericht.fotos.splice(fi,1);scheduleSave();_wpMobRenderFotos(bericht,grid);};
    const nl=document.createElement('div');nl.style.cssText='position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:8px;padding:2px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;';
    nl.textContent=f.name||'Foto';
    cell.append(badge,delB,nl);grid.appendChild(cell);
  });
}

function _wpMobOpenFoto(bericht,startIdx){
  const fotos=(bericht.fotos||[]);
  if(!fotos.length)return;
  let cur=Math.min(startIdx,fotos.length-1);
  const GID='_wpMobFotoViewer';const old=document.getElementById(GID);if(old)old.remove();
  const ov=document.createElement('div');ov.id=GID;
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;';
  const topBar=document.createElement('div');
  topBar.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:12px 14px;flex-shrink:0;';
  const lbl=document.createElement('div');lbl.style.cssText='color:#fff;font-size:13px;font-weight:600;flex:1;';
  const closeX=document.createElement('button');closeX.type='button';closeX.textContent='✕';
  closeX.style.cssText='background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;';
  closeX.onclick=()=>ov.remove();
  topBar.append(lbl,closeX);
  const imgWrap=document.createElement('div');
  imgWrap.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;';
  const imgEl=document.createElement('img');
  imgEl.style.cssText='max-width:100%;max-height:100%;object-fit:contain;touch-action:pinch-zoom;';
  imgWrap.appendChild(imgEl);
  const navBar=document.createElement('div');
  navBar.style.cssText='display:flex;justify-content:space-between;padding:10px 14px;flex-shrink:0;';
  const prevBtn=document.createElement('button');prevBtn.type='button';prevBtn.textContent='◀ Zurück';
  prevBtn.style.cssText='padding:10px 20px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;font-weight:600;cursor:pointer;';
  prevBtn.onclick=()=>{if(cur>0){cur--;_showMobFoto();}};
  const nextBtn=document.createElement('button');nextBtn.type='button';nextBtn.textContent='Weiter ▶';
  nextBtn.style.cssText='padding:10px 20px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;font-weight:600;cursor:pointer;';
  nextBtn.onclick=()=>{if(cur<fotos.length-1){cur++;_showMobFoto();}};
  navBar.append(prevBtn,nextBtn);
  function _showMobFoto(){
    const f=fotos[cur];
    lbl.textContent=(f.name||'Foto '+(cur+1))+' ('+(cur+1)+'/'+fotos.length+')';
    imgEl.src='';imgEl.alt='Lade…';
    if(f.localUrl&&(f.localUrl.startsWith('data:')||f.localUrl.startsWith('blob:'))){
      imgEl.src=f.localUrl;
    }else if(f.localKey&&!f.driveId){
      _mobPhotoGet(f.localKey).then(dataUrl=>{
        if(dataUrl){f.localUrl=dataUrl;imgEl.src=dataUrl;}
        else imgEl.alt='Kein Vorschaubild';
      });
    }else if(f.driveId){
      // Sofort Thumbnail zeigen – dann Vollbild nachladen
      if(f.thumbnail){imgEl.src=f.thumbnail;}
      else if(typeof _mobThumbCache!=='undefined'&&_mobThumbCache.has(f.driveId)){imgEl.src=_mobThumbCache.get(f.driveId);}
      if(typeof gdriveToken!=='undefined'&&gdriveToken){
        fetch('https://www.googleapis.com/drive/v3/files/'+f.driveId+'?alt=media',{headers:{Authorization:'Bearer '+gdriveToken}})
          .then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);f.localUrl=u;imgEl.src=u;})
          .catch(()=>{if(!imgEl.src||imgEl.src===window.location.href)imgEl.alt='Bild nicht verfügbar';});
      } else if(!imgEl.src){imgEl.alt='Bitte erneut einloggen';}
    }
    prevBtn.style.opacity=cur>0?'1':'0.3';
    nextBtn.style.opacity=cur<fotos.length-1?'1':'0.3';
  }
  ov.append(topBar,imgWrap,navBar);
  document.body.appendChild(ov);
  _showMobFoto();
}

function _wpMobFotoAufnehmen(bericht,grid,camera){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  if(!camera)inp.multiple=true; // Galerie: Mehrfachauswahl erlauben
  if(camera)inp.setAttribute('capture','environment');inp.style.display='none';
  inp.onchange=async()=>{
    const files=Array.from(inp.files||[]);if(!files.length)return;

    // ── 1. Alle Vorschaubilder SOFORT anzeigen + IndexedDB sichern ───────────
    // Schritt A: blob-URL für sofortige Vorschau, localKey als dauerhafter Schlüssel
    const fotoObjs=files.map(file=>{
      const blobUrl=URL.createObjectURL(file);
      const localKey='photo_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      const fo={name:file.name,inReport:true,localUrl:blobUrl,localKey,driveId:null,_uploading:false};
      bericht.fotos.push(fo);
      return{file,fo};
    });
    scheduleSave();
    _wpMobRenderFotos(bericht,grid); // Vorschau sofort sichtbar (blob-URL)

    // Schritt B: Parallel in IndexedDB sichern (persistent über Neuladen hinaus)
    fotoObjs.forEach(({file,fo})=>{
      _fileToDataUrl(file).then(dataUrl=>{
        fo.localUrl=dataUrl; // blob-URL durch persistente data-URL ersetzen
        return _mobPhotoSave(fo.localKey,dataUrl);
      }).then(()=>{scheduleSave();}).catch(e=>console.warn('[MobPhoto]',e));
    });

    // ── 2. Uploads parallel im Hintergrund ─────────────────────────────────
    if(typeof gdriveToken!=='undefined'&&gdriveToken){
      const ct=currentTask();
      const fid=ct?_extractFolderIdMob(ct.gdrive||ct.gdriveOrdner||''):null;
      if(fid){
        // Upload-Spinner einblenden
        fotoObjs.forEach(({fo})=>{fo._uploading=true;});
        _wpMobRenderFotos(bericht,grid);

        let ok=0,fail=0;
        await Promise.all(fotoObjs.map(async({file,fo})=>{
          try{
            const form=new FormData();
            form.append('metadata',new Blob([JSON.stringify({name:file.name,parents:[fid],mimeType:file.type})],{type:'application/json'}));
            form.append('file',file);
            const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form});
            if(r.ok){
              const j=await r.json();fo.driveId=j.id;ok++;
              // Drive-Upload erfolgreich → lokale IndexedDB-Kopie kann bereinigt werden
              if(fo.localKey)_mobPhotoDelete(fo.localKey).catch(()=>{});
              // thumbnailLink sofort holen (erspart API-Call beim nächsten Öffnen)
              // Google braucht manchmal 2-3 Sek zum Generieren → kurz warten dann holen
              setTimeout(async()=>{
                try{
                  const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(j.id)+'?fields=thumbnailLink',
                    {headers:{Authorization:'Bearer '+gdriveToken}});
                  if(mr.ok){const md=await mr.json();if(md.thumbnailLink){fo.thumbnail=md.thumbnailLink;scheduleSave();}}
                }catch(_){}
              },3000);
            }
            else fail++;
          }catch(ex){fail++;console.warn('[MobPhoto] Upload:',ex);}
          finally{
            fo._uploading=false;
            scheduleSave();
            _wpMobRenderFotos(bericht,grid); // Spinner entfernen sobald dieses Foto fertig ist
          }
        }));
        if(fail===0)toast('✓ '+ok+' Foto'+(ok!==1?'s':'')+' in Drive gespeichert','success',2500);
        else toast((fail>0?fail+' Fehler – wird beim nächsten Start wiederholt, ':'')+ok+' gespeichert','error',4000);
      }
    }
  };
  document.body.appendChild(inp);inp.click();setTimeout(()=>inp.remove(),30000);
}

function _extractFolderIdMob(url){
  if(!url)return '';const m=url.match(/[-\w]{25,}/);return m?m[0]:'';
}

// ── Ausstehende Foto-Uploads wiederholen ─────────────────────────────────────
// Beim App-Start / nach Login aufrufen: alle Fotos mit localKey aber ohne driveId
// werden aus IndexedDB geladen und erneut zu Google Drive hochgeladen.
async function _mobRetryPendingUploads(){
  if(!gdriveToken||!tokenValid())return;
  let pending=[];
  for(const[,tasks] of Object.entries(boards||{})){
    if(!Array.isArray(tasks))continue;
    for(const task of tasks){
      if(!task)continue;
      const fid=_extractFolderIdMob(task.gdrive||task.gdriveOrdner||'');
      if(!fid)continue;
      for(const pb of task.pruefberichte||[]){
        for(const foto of pb.fotos||[]){
          if(foto.localKey&&!foto.driveId)pending.push({fo:foto,folderId:fid});
        }
      }
    }
  }
  if(!pending.length)return;
  toast('📤 '+pending.length+' Foto-Upload'+(pending.length!==1?'s':'')+' ausstehend – lade hoch…','info',3000);
  let ok=0;
  for(const {fo,folderId} of pending){
    try{await _mobUploadFromKey(fo,folderId);ok++;}catch(e){console.warn('[MobPhoto] Retry:',e);}
  }
  if(ok>0){scheduleSave();toast('✓ '+ok+' Foto'+(ok!==1?'s':'')+' nachträglich hochgeladen','success',3000);}
}

async function _mobUploadFromKey(fo,folderId){
  const dataUrl=await _mobPhotoGet(fo.localKey);
  if(!dataUrl)return;
  const blob=_dataUrlToBlob(dataUrl);
  const mime=blob.type||'image/jpeg';
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:fo.name||'foto.jpg',parents:[folderId],mimeType:mime})],{type:'application/json'}));
  form.append('file',blob);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  fo.driveId=j.id;
  fo.localUrl=dataUrl; // im Speicher behalten für schnelle Anzeige
  await _mobPhotoDelete(fo.localKey); // IndexedDB bereinigen
}

// ── Redirect-Rückkehr: Token aus URL-Hash nach Google-Login lesen ──
// Funktioniert auch im iOS-PWA-Modus (Homescreen-App):
// Dort öffnet der Login in Safari → Token wird in localStorage gespeichert
// → App liest ihn beim nächsten Fokus-/Sichtbarkeits-Wechsel aus.
const _OAUTH_HANDOFF_KEY='pam_oauth_handoff_v1';
document.addEventListener('DOMContentLoaded',function(){
  // ── Neuer Code-Flow: ?code= aus URL lesen ──
  const _query=new URLSearchParams(window.location.search);
  const _authCode=_query.get('code');
  if(_authCode){
    window.history.replaceState({},'',window.location.pathname);
    _exchangeCodeForTokenMobile(_authCode);
    return;
  }
  // ── Legacy: access_token aus Hash (Fallback) ──
  const hash=window.location.hash;
  if(hash&&hash.includes('access_token')){
    const p=new URLSearchParams(hash.substring(1));
    const token=p.get('access_token');
    const exp=p.get('expires_in');
    if(token){
      window.history.replaceState({},'',window.location.pathname);
      try{localStorage.setItem(_OAUTH_HANDOFF_KEY,JSON.stringify({token,exp:exp||3600,ts:Date.now()}));}catch(e){}
      onTokenResponse({access_token:token,expires_in:exp||3600});
      try{if(window.opener||window.history.length<=2)setTimeout(()=>window.close(),800);}catch(e){}
    }
  }
});
// ── Code gegen Tokens tauschen (via Cloud Function) ──
async function _exchangeCodeForTokenMobile(authCode){
  try{
    const response=await fetch(CLOUD_FUNCTION_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'exchange',code:authCode,redirect_uri:_getRedirectUri()}),
    });
    if(!response.ok)throw new Error('Cloud-Server Fehler: '+response.status);
    const data=await response.json();
    if(data.error)throw new Error(data.error);
    // Refresh Token speichern
    if(data.refresh_token){
      try{localStorage.setItem('pam_gdrive_refresh_token',data.refresh_token);}catch(e){}
    }
    // Token für PWA-Handoff ablegen (iOS: Safari → PWA)
    try{localStorage.setItem(_OAUTH_HANDOFF_KEY,JSON.stringify({token:data.access_token,exp:data.expires_in||3600,ts:Date.now()}));}catch(e){}
    onTokenResponse({access_token:data.access_token,expires_in:data.expires_in||3600});
    try{if(window.opener||window.history.length<=2)setTimeout(()=>window.close(),800);}catch(e){}
  }catch(err){
    console.error('[Mobile-Cloud-Auth] Fehler:',err);
    const el=document.getElementById('loginStatus');
    if(el)el.textContent='⚠ Anmeldung fehlgeschlagen: '+err.message;
  }
}

// ── Token im Hintergrund erneuern (via Cloud Function) ──
async function _renewTokenViaCloud(){
  const refreshToken=localStorage.getItem('pam_gdrive_refresh_token');
  if(!refreshToken)return false;
  try{
    const response=await fetch(CLOUD_FUNCTION_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'refresh',refresh_token:refreshToken}),
    });
    if(!response.ok)return false;
    const data=await response.json();
    if(!data.access_token)return false;
    gdriveToken=data.access_token;
    gdriveTokenExpires=Date.now()+(Number(data.expires_in||3600)-60)*1000;
    try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){}
    _hideMobDriveWarnBanner();
    _scheduleGdriveRefresh(Number(data.expires_in||3600));
    console.log('[Cloud-Refresh Mobile] Token automatisch erneuert.');
    return true;
  }catch(e){
    console.warn('[Cloud-Refresh Mobile] Fehler:',e);
    return false;
  }
}

// iOS PWA: wenn Nutzer von Safari zurück zur App wechselt, Token aus localStorage holen
function _checkOauthHandoff(){
  if(gdriveToken)return;
  try{
    const raw=localStorage.getItem(_OAUTH_HANDOFF_KEY);
    if(!raw)return;
    const h=JSON.parse(raw);
    if(!h||!h.token)return;
    // Nur frischen Token verwenden (max. 5 Minuten alt)
    if(Date.now()-h.ts>300000)return;
    localStorage.removeItem(_OAUTH_HANDOFF_KEY);
    onTokenResponse({access_token:h.token,expires_in:h.exp||3600});
  }catch(e){}
}
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible')_checkOauthHandoff();
});
window.addEventListener('focus',_checkOauthHandoff);

  if(!boardSts.length){sec.style.display='none';return;}
  sec.style.display='';
  // Zähle Tasks pro Status
  const counts={};
  tasks.forEach(t=>{const s=t.status||'';counts[s]=(counts[s]||0)+1;});
  const allCount=tasks.length;
  bar.innerHTML='<button class="status-chip'+(currentStatus===''?' active':'')+'" onclick="switchStatus(\'\')">'
    +'Alle <span style="opacity:.7;font-size:11px">('+allCount+')</span></button>'
    +boardSts.map(s=>{
      const cnt=counts[s]||0;
      return '<button class="status-chip'+(currentStatus===s?' active':'')+'" onclick="switchStatus(\''+escAttr(s)+'\')">'
        +esc(s)+' <span style="opacity:.7;font-size:11px">('+cnt+')</span></button>';
    }).join('');
}

      :'';
    const cardMapsBtn=cardAdr
      ?'<a href="https://maps.google.com/?q='+encodeURIComponent(cardAdr)+'" target="_blank" onclick="event.stopPropagation()" '
        +'style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#2e7d32;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">'+_SVG_PIN+'</a>'
      :'';
    const showCardActions=!!(cardTelBtn||cardMapsBtn);
    // Foto-Thumbnail für Karte
    const _fotoCount=(t.fotos||[]).length;
    const _fotoThumbHtml=_fotoCount>0
      ?'<div class="card-foto-wrap">'
        +'<img id="cfoto_'+escAttr(t.id)+'" src="" alt="" onerror="this.style.display=\'none\'">'

    return '<div class="task-card" onclick="openDetail(\''+escAttr(t.id)+'\')">'
      +'<div class="task-card-body">'
      +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;">'

        const ov=t.due&&isOverdue(t.due);
        // Neue aufgaben (Desktop-System) als Datebox anzeigen

        const _aufgColors=[

        const allBoxes=[...aufgBoxes,...legacyBoxes].join('');
        return allBoxes?'<div class="m-dbox-row">'+allBoxes+'</div>':'';
      } catch(_de){ console.warn('[renderList aufgaben]',t&&t.id,_de); return ''; } })()
      +(showCardActions
        ?'<div style="display:flex;align-items:center;gap:8px;padding:6px 0 2px;border-top:0.5px solid var(--border);margin-top:6px;">'

      +_fotoThumbHtml

  }).join('');
  if(runningTaskId)_startListTickLoop();else _stopListTickLoop();
  // Foto-Thumbnails asynchron nachladen
  (async()=>{
    for(const t of filtered){
      if(!(t.fotos&&t.fotos.length))continue;
      const img=document.getElementById('cfoto_'+t.id);
      if(!img)continue;
      const f=t.fotos[0];
      try{
        if(f.localUrl&&(f.localUrl.startsWith('data:')||f.localUrl.startsWith('blob:'))){
          img.src=f.localUrl;
        }else if(f.localKey){
          const dataUrl=await _mobPhotoGet(f.localKey);

          if(f.thumbnail){img.src=f.thumbnail;}

        }
      }catch(e){console.warn('[card-foto]',t.id,e);}
    }
  })();
}

    const cell=document.createElement('div');

// ── Baudoku: Zeiterfassung (Einträge-Liste, Timer ist oben in Timer-Bar) ──
let _bauTimerInterval=null;

function _renderBauZeit(t){
  const entries=t.zeitEntries||[];
  const _pm=(v,b)=>{try{const[vh,vm]=(v||'0:0').split(':').map(Number);const[bh,bm]=(b||'0:0').split(':').map(Number);const d=(bh*60+bm)-(vh*60+vm);return d>0?d:0;}catch(_){return 0;}};
  let html='';
  if(entries.length){
    entries.forEach((e,i)=>{
      const min=_pm(e.von,e.bis);
      const dauer=min>0?(Math.floor(min/60)>0?Math.floor(min/60)+'h ':'')+(min%60)+'min':'–';
      html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:6px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;">'
        +'<div style="font-size:14px;font-weight:600;">'+esc((e.von||'?')+' – '+(e.bis||'?'))+'</div>'
        +'<div style="font-size:13px;font-weight:700;color:var(--accent2);">'+dauer+'</div>'
        +'</div>'
        +(e.beschreibung?'<div style="font-size:12px;color:var(--text2);margin-top:2px;">'+esc(e.beschreibung)+'</div>':'')
        +(e.mitarbeiter?'<div style="font-size:12px;color:var(--green);margin-top:2px;">👷 '+esc(e.mitarbeiter)+'</div>':'')
        +'</div>';
    });
  }else{
    html+='<div style="color:var(--text2);font-size:13px;padding:6px 0;">Noch keine abgeschlossenen Einträge.</div>';
  }
  html+='<div style="display:flex;gap:7px;margin-top:6px;">'
    +'<button class="inline-btn" style="flex:1" onclick="addBauZeitEintrag()">+ Manuell eintragen</button>'
    +'</div>';
  return html;
}

let _artikelDaten=null; // [[name,einheit,gruppe], ...]

let _matAktiveGruppe='';

async function _ladeArtikel(){
  if(_artikelDaten)return _artikelDaten;
  if(_artikelLadePromise)return _artikelLadePromise;
  _artikelLadePromise=(async()=>{
    try{
      const r=await fetch('./artikel.json');

      return _artikelDaten;
    }catch(e){
      console.warn('[Artikel]',e);
      toast('Artikelliste nicht geladen: '+e.message,'error');
      return [];
    }
  })();
  return _artikelLadePromise;
}

// ── EAN-Foto-Scan (Kamera → Bild → Barcode erkennen) ──────────────────────
function triggerBauEanScan(){
  const inp=document.getElementById('bauEanScanInput');
  if(inp){inp.value='';inp.click();}
}

let _zxingLoaded=false,_zxingLoadPromise=null;
function _loadZxing(){
  if(_zxingLoaded)return Promise.resolve();
  if(_zxingLoadPromise)return _zxingLoadPromise;
  _zxingLoadPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.19.3/umd/index.min.js';
    s.onload=()=>{_zxingLoaded=true;resolve();};
    s.onerror=()=>reject(new Error('ZXing laden fehlgeschlagen'));
    document.head.appendChild(s);
  });
  return _zxingLoadPromise;
}

async function processBauEanPhoto(input){
  if(!input||!input.files||!input.files[0])return;
  const file=input.files[0];
  input.value='';
  toast('Barcode wird erkannt…','info',3000);
  let ean=null;
  let objUrl=null;

  try{
    objUrl=URL.createObjectURL(file);

    // Versuch 1: BarcodeDetector (Chrome/Android – nativ, kein Download)
    if('BarcodeDetector' in window){
      try{
        const detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a','upc_e']});
        const bmp=await createImageBitmap(file);
        const codes=await detector.detect(bmp);
        if(codes.length)ean=codes[0].rawValue;
      }catch(e){console.warn('[EAN] BarcodeDetector:',e);}
    }

    // Versuch 2: ZXing via Canvas (iOS Safari + Firefox)
    if(!ean){
      try{
        await _loadZxing();
        // Bild in Canvas laden (löst auch EXIF-Rotation)
        const img=document.createElement('img');
        await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=objUrl;});
        const canvas=document.createElement('canvas');
        canvas.width=img.naturalWidth;
        canvas.height=img.naturalHeight;
        canvas.getContext('2d').drawImage(img,0,0);
        const hints=new Map();
        if(typeof ZXing!=='undefined'&&ZXing.DecodeHintType){
          hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
        }
        const reader=new ZXing.BrowserMultiFormatReader(hints);
        // Canvas-Methode (synchron)
        try{const r=reader.decodeFromCanvas(canvas);if(r)ean=r.getText();}catch(_){}
        // Image-Element-Methode (async, Fallback)
        if(!ean){try{const r=await reader.decodeFromImage(img);if(r)ean=r.getText();}catch(_){}}
      }catch(e){console.warn('[EAN] ZXing:',e);}
    }

  }finally{
    if(objUrl)URL.revokeObjectURL(objUrl);
  }

  if(!ean){
    toast('Barcode nicht erkannt – bitte nochmal fotografieren (gute Beleuchtung, Barcode gerade halten)','warn',4500);
    return;
  }
  await _bauEanMatch(ean);
}

async function _bauEanMatch(ean){
  const liste=await _ladeArtikel();
  // a[4] = EAN (nach VBA-Update: [name,einheit,gruppe,vk,ean])
  const artikel=liste.find(a=>a[4]&&String(a[4]).trim()===String(ean).trim());
  if(!artikel){
    toast('EAN '+ean+' nicht in Lagerverwaltung gefunden','warn',4000);
    return;
  }
  const t=currentTask();if(!t)return;
  if(!t.materialGeplant)t.materialGeplant=[];
  const exists=t.materialGeplant.some(m=>m.name===artikel[0]);
  if(!exists){
    t.materialGeplant.push({name:artikel[0],einheit:artikel[1],gruppe:artikel[2]||'',menge:null,vk:artikel[3]||null});
    scheduleSave();
  }
  renderBaudokuTab(t);
  const bm=document.querySelector('[data-sect="bau_Material"]');
  if(bm&&!bm.classList.contains('open'))toggleMSect(bm);
  toast('✓ '+artikel[0]+' hinzugefügt','success',3000);
}

function _matBaueGruppenFilter(){
  const wrap=document.getElementById('matGruppenFilter');
  if(!wrap||!_artikelDaten)return;
  const gruppen=['Alle',...new Set(_artikelDaten.map(a=>a[2]).filter(Boolean).sort())];
  wrap.innerHTML=gruppen.map(g=>
    '<span class="mat-modal-fchip'+(_matAktiveGruppe===g?' active':'')+'" onclick="_matSetGruppe(\''+escAttr(g)+'\')">'+esc(g)+'</span>'
  ).join('');
}

function _matSetGruppe(g){
  _matAktiveGruppe=(g==='Alle'?'':g);
  _matBaueGruppenFilter();
  _matSuchFilter();
}

function _matSuchFilter(){
  const liste=document.getElementById('matSuchListe');
  if(!liste||!_artikelDaten){liste.innerHTML='<div class="mat-modal-empty">Lade…</div>';return;}
  const q=(document.getElementById('matSuchInput')?.value||'').trim().toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  const words=q.split(/\s+/).filter(Boolean);
  const _norm=s=>String(s||'').toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  let results=_artikelDaten.filter(a=>{
    if(_matAktiveGruppe&&a[2]!==_matAktiveGruppe)return false;
    if(!words.length)return true;
    const hay=_norm(a[0]+' '+a[2]);
    return words.every(w=>hay.includes(w));
  });
  if(!results.length){
    liste.innerHTML='<div class="mat-modal-empty">Keine Treffer für „'+esc(q)+'"</div>';return;
  }
  const shown=results.slice(0,80);
  liste.innerHTML=shown.map((a,i)=>
    '<div class="mat-modal-item" onclick="_matArtikelWaehlen('+i+')">'
    +'<div style="flex:1;min-width:0;">'
    +'<div class="mat-modal-item-name">'+esc(a[0])+'</div>'
    +(a[2]?'<div class="mat-modal-item-meta">'+esc(a[2])+'</div>':'')
    +'</div>'
    +'<div class="mat-modal-item-ein">'+esc(a[1])+'</div>'
    +'</div>'
  ).join('');
  // Index in gefilterten Ergebnissen merken für Auswahl
  liste._matResults=shown;
  if(results.length>80)liste.innerHTML+='<div class="mat-modal-empty" style="font-size:12px;">… '+(results.length-80)+' weitere – Suche verfeinern</div>';
}

function _matArtikelWaehlen(idx){
  const liste=document.getElementById('matSuchListe');
  if(!liste||!liste._matResults)return;
  const a=liste._matResults[idx];
  if(!a)return;
  const t=currentTask();if(!t)return;
  // Zur materialGeplant hinzufügen (falls noch nicht vorhanden)
  if(!t.materialGeplant)t.materialGeplant=[];
  const exists=t.materialGeplant.some(m=>m.name===a[0]);
  if(!exists){
    t.materialGeplant.push({name:a[0],einheit:a[1],gruppe:a[2]||'',menge:null});
    scheduleSave();
    toast('✅ '+a[0].slice(0,35)+' hinzugefügt','success');
  }else{
    toast('Bereits in der Liste','info');
  }
  closeMatSuche();
  renderBaudokuTab(t);
  const bm=document.querySelector('[data-sect="bau_Material"]');
  if(bm&&!bm.classList.contains('open'))toggleMSect(bm);
}

function startBauMaterialDiktat(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Spracherkennung nicht verfügbar','error');return;
  }
  openBauMaterialSuche();
  setTimeout(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.lang='de-DE';r.interimResults=false;
    r.onresult=e=>{
      const txt=e.results[0][0].transcript;
      const inp=document.getElementById('matSuchInput');
      if(inp){inp.value=txt;_matSuchFilter();}
      toast('🎤 '+txt,'success');
    };
    r.onerror=e=>toast('🎤 Fehler: '+e.error,'error');
    r.start();
    toast('🎤 Sprechen Sie den Artikel…','info');
  },400);
}

// WMO Wetter-Code → internes Kürzel + Beschreibung
function _wmoToWetter(code,temp){
  if(code===0||code===1)return{k:'sonnig',lbl:'Klar / Heiter'};
  if(code===2||code===3)return{k:'bewoelkt',lbl:'Bewölkt'};
  if(code>=45&&code<=48)return{k:'bewoelkt',lbl:'Nebelig'};
  if((code>=51&&code<=82)||code===95||code===96||code===99)return{k:'regen',lbl:'Niederschlag'};
  if(code>=71&&code<=77)return{k:'kalt',lbl:'Schneefall'};
  if(temp!==null&&temp<3)return{k:'kalt',lbl:'Sehr kalt'};
  return{k:'bewoelkt',lbl:'Wechselhaft'};
}

async function ladeBauWetter(){
  const t=currentTask();if(!t)return;
  if(!navigator.geolocation){toast('GPS nicht verfügbar','error');return;}
  toast('📍 Standort wird ermittelt…','info');
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude:lat,longitude:lon}=pos.coords;
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,weather_code&timezone=auto`;
      const r=await fetch(url);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();
      const temp=Math.round(d.current.temperature_2m*10)/10;
      const code=d.current.weather_code;
      const {k,lbl}=_wmoToWetter(code,temp);
      const now=new Date();
      const datum=now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      const uhrzeit=now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      t.wetter=k;
      t.wetterDaten={temp,beschreibung:lbl,datum,uhrzeit,code};
      scheduleSave();
      renderBaudokuTab(t);
      const bw=document.querySelector('[data-sect="bau_Wetter"]');
      if(bw&&!bw.classList.contains('open'))toggleMSect(bw);
      toast('✅ '+temp+'°C · '+lbl,'success');
    }catch(e){toast('Wetter-Fehler: '+e.message,'error');}
  },err=>{
    const gpsMsg={
      1:'Standort-Zugriff verweigert – bitte in den Browser-Einstellungen erlauben.',
      2:'Standort nicht verfügbar – bitte nochmal versuchen.',
      3:'Zeitüberschreitung – bitte nochmal versuchen.'
    };
    toast('📍 '+(gpsMsg[err.code]||'GPS-Fehler: '+err.message),'error',5000);
  },{timeout:15000,maximumAge:120000,enableHighAccuracy:false});
}

// ── Baudoku: Spracherkennung (Notiz) mit visuellem Indikator ──
let _bauDiktatRec=null;
let _bauDiktatFinalText=''; // Gesammelter finaler Text dieser Aufnahme-Session
function startBaudokuDiktat(){
  // Läuft bereits → stoppen
  if(_bauDiktatRec){try{_bauDiktatRec.stop();}catch(_){}return;}
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Spracherkennung nicht verfügbar (Chrome/Android empfohlen)','error');return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();
  r.lang='de-DE';r.interimResults=true;r.maxAlternatives=1;r.continuous=true;
  _bauDiktatRec=r;
  _bauDiktatFinalText='';
  const _restoreBtn=()=>{
    // Wird nach renderDetail aufgerufen um den Button-Zustand wiederherzustellen
    const btn2=document.getElementById('baudokuDiktatBtn');
    if(btn2&&_bauDiktatRec){
      btn2.classList.add('recording');
      btn2.innerHTML='<span class="bau-diktat-dot"></span>Aufnahme läuft – Tippen zum Stoppen';
      btn2.onclick=startBaudokuDiktat;
    }
  };
  const _setActive=on=>{
    const b=document.getElementById('baudokuDiktatBtn');
    if(b){
      b.classList.toggle('recording',on);
      b.innerHTML=on?'<span class="bau-diktat-dot"></span>●':'🎤';
    }
  };
  _setActive(true);
  r.onresult=e=>{
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final){
      _bauDiktatFinalText+=((_bauDiktatFinalText?' ':'')+final.trim());
    }
    // Zwischenresultat als Vorschau im Quick-Input zeigen
    const inp=document.getElementById('bauNotizQuick');
    if(inp&&interim){inp.value='💬 '+interim;}
    // Button-Zustand wiederherstellen falls renderBaudokuTab aufgerufen wurde
    _restoreBtn();
  };
  r.onend=()=>{
    const finalText=_bauDiktatFinalText.trim();
    _bauDiktatRec=null;_bauDiktatFinalText='';
    _setActive(false);
    const inp=document.getElementById('bauNotizQuick');if(inp&&inp.value.startsWith('💬 '))inp.value='';
    // Diktat als Notiz-Log-Eintrag speichern
    if(finalText){
      addNotiz('🎤 '+finalText);
      forceSave();
      toast('🎤 Diktat als Notiz gespeichert','success');
    }
  };
  r.onerror=e=>{
    _bauDiktatRec=null;_bauDiktatFinalText='';
    _setActive(false);
    const inp=document.getElementById('bauNotizQuick');if(inp&&inp.value.startsWith('💬 '))inp.value='';
    toast('🎤 Fehler: '+e.error,'error');
  };
  r.start();
}

// ── Akte nachtragen (Mobile) ──
function loadAkteNachtragen(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onerror=()=>toast('Fehler beim Lesen der Akte','error');
  reader.onload=ev=>{
    try{
      const text=ev.target.result;if(!text)throw new Error('Datei leer');
      const t=currentTask();if(!t){toast('Kein Task geöffnet','error');return;}
      const lines=text.split('\n');
      const get=key=>{for(const l of lines){if(!l)continue;if(l.toLowerCase().includes(key.toLowerCase()+':')){const idx=l.indexOf(':');if(idx<0)continue;const v=l.substring(idx+1).trim();return(v===''||v==='(noch offen)')?'':v;}}return'';};
      const getML=key=>{for(let i=0;i<lines.length;i++){const l=lines[i];if(!l)continue;if(l.toLowerCase().includes(key.toLowerCase()+':')){const idx=l.indexOf(':');if(idx<0)continue;let val=l.substring(idx+1).trim();for(let j=i+1;j<lines.length;j++){const nlt=(lines[j]||'').trim();if(nlt.length>2&&/^[A-Z][A-Z0-9_]+$/.test(nlt))break;if(/^[A-Za-z][A-Za-z0-9_]{1,39}:/.test(nlt))break;if(val!==''||nlt!=='')val+=(val?'\n':'')+nlt;}const r=val.trim();return(r===''||r==='(noch offen)')?'':r;}}return'';};
      const _set=(field,val,fn)=>{if(!val||(t[field]&&t[field].toString().trim()))return false;fn?fn(val):updateField(field,val);return true;};
      const filled=[];
      if(_set('tags',get('Auftrag_Kostenstelle'),v=>{updateTags(v);}))filled.push('Kostenstelle');
      if(_set('repNr',get('Rep_Nr')))filled.push('Rep.-Nr.');
      if(_set('kundenNr',get('Kunden_Nr')))filled.push('Kunden-Nr.');
      if(_set('hausverwaltung',get('Objekt_Hausverwaltung')||get('Auftraggeber')))filled.push('Hausverwaltung');
      if(_set('adresse',get('Objekt_Strasse')))filled.push('Adresse');
      if(_set('schadensbild',getML('Baustelle_Schadensbild')))filled.push('Schadensbild');
      if(_set('owner',get('Bearbeiter')))filled.push('Bearbeiter');
      if(filled.length){forceSave();renderDetail(t);toast('📂 Akte: '+filled.join(', '),'success');}
      else toast('Akte geladen – keine neuen Felder zu füllen','info');
    }catch(err){toast('Fehler: '+err.message,'error');}
  };
  reader.readAsText(file,'windows-1252');
  e.target.value='';
}

// ══ FELD-EDITS ══
function currentTask(){return currentTaskId?findTaskById(currentTaskId):null;}
function updateField(field,value){
  const t=currentTask();if(!t)return;
  t[field]=value;scheduleSave();
}

// ── Stammblatt-Ordner: adressbasierter localStorage-Cache ─────────────────
function _sbOrdnerKey(adr){ return 'sbOrdner::'+((adr||'').trim().toLowerCase()); }
function _saveSbOrdnerForAdr(){
  var t=currentTask(); if(!t) return;
  var adr=(t.adresse||'').trim();
  var url=(t.sbPdfOrdner||'').trim();
  if(!adr||!url) return;
  try{ localStorage.setItem(_sbOrdnerKey(adr), url); } catch(e){}
}
function _autoFillSbOrdner(){
  var t=currentTask(); if(!t) return;
  if((t.sbPdfOrdner||'').trim()) return;
  var adr=(t.adresse||'').trim();
  if(!adr) return;
  try{
    var saved=localStorage.getItem(_sbOrdnerKey(adr));
    if(saved){ t.sbPdfOrdner=saved; scheduleSave(); renderDetail(currentTaskId); }
  }catch(e){}
}
function _openSbPdfOrdner(){
  var t=currentTask(); if(!t) return;
  var url=(t.sbPdfOrdner||'').trim();
  if(url) window.open(url,'_blank');
  else alert('Bitte zuerst den Drive-Ordner eintragen — er wird dann für diese Adresse gespeichert.');
}
function _openStammblattMob(){
  var isGithub=window.location.hostname.includes('github.io');
  var url=isGithub?'https://ddmbraun.github.io/PAM-Desktop/stammblatt.html':'../stammblatt.html';
  window.open(url,'_blank');
}
// ──────────────────────────────────────────────────────────────────────────
function updateTags(value){
  const t=currentTask();if(!t)return;
  t.tags=value.split(',').map(s=>s.trim()).filter(Boolean);
  scheduleSave();
}
function updateNavBtn(){
  const t=currentTask();if(!t)return;
  const btn=document.getElementById('navBtn');if(!btn)return;
  if(t.adresse){btn.classList.remove('disabled');btn.href='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(t.adresse);}
  else{btn.classList.add('disabled');btn.href='#';}
}

// ══ KONTAKTE ══
function renderKontakt(k,i){
  const rollen={mieter:'🏠 Mieter',eigentuemer:'👤 Eigentümer',hausverwaltung:'🏢 HV',sonstiges:'👥 Sonstiges'};
  const rolleOpts=Object.entries(rollen).map(([v,l])=>'<option value="'+v+'"'+(v===(k.rolle||'mieter')?' selected':'')+'>'+l+'</option>').join('');
  const telHref=k.tel?'tel:'+String(k.tel).replace(/\s+/g,''):'#';
  return '<div class="kontakt-entry">'
    +'<div class="kontakt-entry-head"><select onchange="updateKontakt('+i+',\'rolle\',this.value)">'+rolleOpts+'</select>'
    +'<button class="rm-btn" onclick="removeKontakt('+i+')">✕</button></div>'
    +'<div class="field"><label>Name</label><input type="text" value="'+escAttr(k.name||'')+'" oninput="updateKontakt('+i+',\'name\',this.value)" autocomplete="off"></div>'
    +'<div class="field"><label>Telefon</label><div class="field-row" style="gap:6px"><input type="tel" value="'+escAttr(k.tel||'')+'" oninput="updateKontakt('+i+',\'tel\',this.value)" autocomplete="off"><a class="call-link'+(k.tel?'':' disabled')+'" href="'+telHref+'">📞</a></div></div>'
    +'<div class="field"><label>E-Mail</label><input type="email" value="'+escAttr(k.email||'')+'" oninput="updateKontakt('+i+',\'email\',this.value)" autocomplete="off"></div>'
    +'</div>';
}
function addKontakt(){
  const t=currentTask();if(!t)return;
  if(!t.kontakte)t.kontakte=[];
  t.kontakte.push({rolle:'mieter',name:'',tel:'',email:''});
  _mOpenSections['Kontakte']=true;
  forceSave();renderDetail(t);
}
function removeKontakt(i){
  const t=currentTask();if(!t)return;
  t.kontakte.splice(i,1);forceSave();renderDetail(t);
}
function updateKontakt(i,f,v){
  const t=currentTask();if(!t)return;
  if(!t.kontakte||!t.kontakte[i])return;
  t.kontakte[i][f]=v;scheduleSave();
}

const MOBILE_TIMER_KEY='ptpm_timer';
const MOBILE_TIMER_COLLAPSED_KEY='ptpm_timer_collapsed';

function _isTimerCollapsed(){try{return localStorage.getItem(MOBILE_TIMER_COLLAPSED_KEY)==='1';}catch(e){return false;}}
function _setTimerCollapsed(v){try{v?localStorage.setItem(MOBILE_TIMER_COLLAPSED_KEY,'1'):localStorage.removeItem(MOBILE_TIMER_COLLAPSED_KEY);}catch(e){}}

function _loadTimerState(){try{const r=localStorage.getItem(MOBILE_TIMER_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function _saveTimerState(s){try{s?localStorage.setItem(MOBILE_TIMER_KEY,JSON.stringify(s)):localStorage.removeItem(MOBILE_TIMER_KEY);}catch(e){}}
function isTimerRunningForTask(taskId){
  const s=_loadTimerState();
  return !!(s&&s.taskId&&s.taskId===taskId);
}
function formatTimerFor(taskId){
  const s=_loadTimerState();
  if(!s||s.taskId!==taskId||!s.startMs)return '00:00:00';
  const ms=Math.max(0,Date.now()-s.startMs);
  const sec=Math.floor(ms/1000);
  return [Math.floor(sec/3600),Math.floor(sec%3600/60),sec%60].map(n=>String(n).padStart(2,'0')).join(':');
}
function _tickTimerDisplay(){
  const s=_loadTimerState();if(!s)return;
  const el=document.getElementById('timerDisplay');
  if(el)el.textContent=formatTimerFor(s.taskId);
  const el2=document.getElementById('bauTimerDisplay');
  if(el2)el2.textContent=formatTimerFor(s.taskId);
}
function _startTickLoop(){
  if(mobileTimerInterval)clearInterval(mobileTimerInterval);
  _tickTimerDisplay();
  mobileTimerInterval=setInterval(_tickTimerDisplay,1000);
}
function _stopTickLoop(){
  if(mobileTimerInterval){clearInterval(mobileTimerInterval);mobileTimerInterval=null;}
}
function toggleMobileTimer(taskId){
  const t=findTaskById(taskId);if(!t){toast('Task nicht gefunden','error');return;}
  const s=_loadTimerState();
  if(s&&s.taskId===taskId){
    // STOPPEN
    const startMs=s.startMs||Date.now();
    const endMs=Date.now();
    const beschreibung=(s.beschreibung||'').trim()||'Stoppuhr';
    if(!t.timeEntries)t.timeEntries=[];
    const open=t.timeEntries.find(e=>!e.end);
    if(open){open.end=endMs;}
    else{t.timeEntries.push({start:startMs,end:endMs});}
    const d1=new Date(startMs),d2=new Date(endMs);
    const pad=n=>String(n).padStart(2,'0');
    const entry={
      date:d1.toISOString().split('T')[0],
      von:pad(d1.getHours())+':'+pad(d1.getMinutes()),
      bis:pad(d2.getHours())+':'+pad(d2.getMinutes()),
      beschreibung
    };
    if(!t.zeitEntries)t.zeitEntries=[];
    t.zeitEntries.push(entry);
    _saveTimerState(null);_stopTickLoop();
    clearTimeout(_bauTimerInterval);_bauTimerInterval=null;
    _mOpenSections['Zeiterfassung']=true;
    forceSave();
    renderDetail(t);
    toast('⏹ '+entry.von+' – '+entry.bis+' | '+beschreibung,'success');
  }else{
    // STARTEN → Beschreibung aus Eingabefeld lesen (Task-Info oder Baudoku-Tab)
    const descInput=document.getElementById('timerDesc')||document.getElementById('bauTimerDesc');
    const beschreibung=(descInput?descInput.value.trim():'')||'';
    // Alten Timer (andere Task) automatisch beenden
    if(s&&s.taskId&&s.taskId!==taskId){
      const other=findTaskById(s.taskId);
      if(other){
        const startMs=s.startMs||Date.now();const endMs=Date.now();
        if(!other.timeEntries)other.timeEntries=[];
        const open=other.timeEntries.find(e=>!e.end);
        if(open)open.end=endMs;else other.timeEntries.push({start:startMs,end:endMs});
        const d1=new Date(startMs),d2=new Date(endMs);const pad=n=>String(n).padStart(2,'0');
        if(!other.zeitEntries)other.zeitEntries=[];
        other.zeitEntries.push({date:d1.toISOString().split('T')[0],von:pad(d1.getHours())+':'+pad(d1.getMinutes()),bis:pad(d2.getHours())+':'+pad(d2.getMinutes()),beschreibung:(s.beschreibung||'Stoppuhr')+' (auto-gestoppt)'});
      }
    }
    const now=Date.now();
    if(!t.timeEntries)t.timeEntries=[];
    t.timeEntries.push({start:now,end:null});
    _saveTimerState({taskId,startMs:now,beschreibung});
    _startTickLoop();
    forceSave();
    renderDetail(t);
    toast('▶ Stoppuhr läuft'+(beschreibung?' – '+beschreibung:''),'success');
  }
}

function _gcalUrl(z,taskTitle){
  // Build Google Calendar "Add Event" URL from a zeit entry
  const d=(z.date||'').replace(/-/g,''); // YYYYMMDD
  function toGcalTime(hhmm){
    if(!hhmm)return '';
    const [h,m]=(hhmm+':00').split(':');
    return d+'T'+(h||'00').padStart(2,'0')+(m||'00').padStart(2,'0')+'00';
  }
  const start=toGcalTime(z.von);
  const end=toGcalTime(z.bis);
  if(!start||!end)return null;
  const title=encodeURIComponent((z.beschreibung||taskTitle||'Zeiteintrag'));
  const details=encodeURIComponent((taskTitle?taskTitle+'\n':'')+(z.beschreibung||''));
  return 'https://calendar.google.com/calendar/r/eventedit?text='+title+'&dates='+start+'/'+end+'&details='+details;
}
function _openGcalZeit(i){
  const t=currentTask();if(!t)return;
  const z=(t.zeitEntries||[])[i];if(!z)return;
  const url=_gcalUrl(z,t.title||'');
  if(url)window.open(url,'_blank');
}
// ── Outlook / ICS Export (Zeiterfassung Mobile) ──
function _ez2(n){return n<10?'0'+n:String(n);}
function _buildIcs(title,desc,dateStr,vonStr,bisStr){
  const now=new Date();
  const stamp=now.getFullYear()+_ez2(now.getMonth()+1)+_ez2(now.getDate())+'T'+_ez2(now.getHours())+_ez2(now.getMinutes())+'00Z';
  let dtStart,dtEnd;
  if(dateStr){
    const d=dateStr.replace(/-/g,'');
    if(vonStr&&bisStr){
      function toT(hhmm){const[h,m]=(hhmm+':00').split(':');return d+'T'+(h||'00').padStart(2,'0')+(m||'00').padStart(2,'0')+'00';}
      dtStart=toT(vonStr);dtEnd=toT(bisStr);
    }else{dtStart='VALUE=DATE:'+d;dtEnd='VALUE=DATE:'+d;}
  }else{
    const d=now.getFullYear()+_ez2(now.getMonth()+1)+_ez2(now.getDate());
    dtStart='VALUE=DATE:'+d;dtEnd='VALUE=DATE:'+d;
  }
  const esc2=s=>(s||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
  return['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//PAM Mobil//DE','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT','DTSTAMP:'+stamp,'UID:pam-mob-'+Date.now()+'@mobil',
    'SUMMARY:'+esc2(title),'DESCRIPTION:'+esc2(desc),
    dtStart.startsWith('VALUE')?'DTSTART;'+dtStart:'DTSTART:'+dtStart,
    dtEnd.startsWith('VALUE')?'DTEND;'+dtEnd:'DTEND:'+dtEnd,
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
function _icsDownload(filename,icsContent){
  const blob=new Blob([icsContent],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);
}
function _openOutlookZeitMob(i){
  const t=currentTask();if(!t)return;
  const z=(t.zeitEntries||[])[i];if(!z)return;
  const title=z.beschreibung||t.title||'Zeiteintrag';
  const desc=(t.title?t.title+'\n':'')+(z.beschreibung||'');
  const ics=_buildIcs(title,desc,z.date||'',z.von||'',z.bis||'');
  _icsDownload('zeiteintrag.ics',ics);
}

function renderNotizen(list){
  if(!list||!list.length)return '<div style="color:var(--text2);font-size:13px;padding:6px 0">Noch keine Einträge.</div>';
  // Offene Notizen zuerst (umgekehrt chron.), erledigte nach unten
  const open=list.map((n,i)=>({n,i})).filter(x=>!x.n.done);
  const done=list.map((n,i)=>({n,i})).filter(x=>!!x.n.done);
  const sorted=[...open.slice().reverse(),...done.slice().reverse()];
  return sorted.map(({n,i})=>{
    const isDone=!!n.done;
    return '<div class="notiz-entry" style="'+(isDone?'opacity:.55;':'')+'">'
      +'<button onclick="toggleNotizDone('+i+')" style="float:left;margin-right:8px;min-width:32px;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--accent);background:'+(isDone?'var(--accent)':'transparent')+';color:'+(isDone?'#fff':'var(--accent)')+';font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">'+(isDone?'✓':'○')+'</button>'
      +'<div style="overflow:hidden;">'
        +(isDone?'<s style="color:var(--text2);font-size:13px;">'+esc(n.text||'')+'</s>':'<span style="font-size:13px;">'+esc(n.text||'')+'</span>')
        +'<div style="font-size:10px;color:var(--text2);margin-top:3px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;">'
          +'<span>'+esc(n.ts||'')+'</span>'
          +(isDone?'<span style="color:var(--green)">· ✓ '+esc(n.doneTs||'')+'</span>':'')
          +'<button class="rm-btn" style="height:22px;font-size:11px;padding:0 6px;margin-left:auto;" onclick="removeNotiz('+i+')">✕</button>'

// Cache für Blob-URLs (driveId -> ObjectURL). Einträge werden beim Verlassen des Detail-Screens NICHT freigegeben,
// damit bei Re-Renders nicht jedes Mal neu geladen wird. Bei Logout/Reload gibt der Browser sie automatisch frei.
const _fotoBlobCache=new Map();

// ── HV-Bild Cache (geteilt mit Desktop über localStorage) ────────────
const _HV_CACHE_MAX_AGE_MOB = 24 * 60 * 60 * 1000; // 24 Stunden
let _hvBildCacheMapMob = null;

function _hvBildCacheLoadMob(){
  try{
    const raw = localStorage.getItem('hv_bild_cache_v1');
    if(!raw){ _hvBildCacheMapMob = new Map(); return; }
    const parsed = JSON.parse(raw);
    if(parsed.ts && (Date.now() - parsed.ts) > _HV_CACHE_MAX_AGE_MOB){
      console.info('[PAM-Mobil] HV-Bild-Cache älter als 24h – bitte HV-Bildersuche neu laden.');
    }
    _hvBildCacheMapMob = new Map();
    if(parsed.map){
      Object.entries(parsed.map).forEach(function(e){ if(e[0]&&e[1]) _hvBildCacheMapMob.set(e[0],e[1]); });
    } else {
      (parsed.zeilen||[]).forEach(function(row){
        const fid = row[0]; const vorschau = row[7]||'';
        if(fid && vorschau) _hvBildCacheMapMob.set(fid, vorschau);
      });
    }
  }catch(e){ _hvBildCacheMapMob = new Map(); }
}

function _hvBildCacheLookupMob(driveId){
  if(!driveId) return '';
  if(_hvBildCacheMapMob === null) _hvBildCacheLoadMob();
  return _hvBildCacheMapMob.get(driveId) || '';
}

// HV-Bild IndexedDB lesen (gleiche Origin -> gleiche IDB-Instanz).
// Gibt data:URL zurueck wenn HV-Bild das Bild bereits gecacht hat.
async function _hvBildIdbLookup(driveId) {
  if (!driveId) return null;
  try {
    const db = await new Promise((resolve, reject) => {
      const req = indexedDB.open('hv-thumb-cache-v1', 1);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error('blocked'));
    });
    if (!db.objectStoreNames.contains('thumbs')) { db.close(); return null; }
    const entry = await new Promise(resolve => {
      const req2 = db.transaction('thumbs','readonly').objectStore('thumbs').get(driveId);
      req2.onsuccess = () => resolve(req2.result || null);
      req2.onerror = () => resolve(null);
    });
    db.close();
    return (entry && entry.dataUrl) ? entry.dataUrl : null;
  } catch(e) { return null; }
}

// Wenn HV-Bildersuche (anderer Tab) den Cache aktualisiert → sofort übernehmen
window.addEventListener('storage', function(e){
  if(e.key !== 'hv_bild_cache_v1') return;
  _hvBildCacheMapMob = null; // In-Memory-Map zurücksetzen
  console.info('[PAM-Mobil] HV-Bild-Cache aktualisiert – neu eingelesen.');
  // Sichtbare Thumbnails neu laden
  try{
    document.querySelectorAll('img[data-foto-id]').forEach(function(img){
      delete img.dataset.hydrated;
    });
    hydrateFotoThumbs();
  }catch(e2){}
});

// Alle Thumbnails im Hintergrund vorladen (Browser-Cache wärmen)
function _preloadHvBildCacheMob(){
  try{
    const raw = localStorage.getItem('hv_bild_cache_v1');
    if(!raw) return;
    const parsed = JSON.parse(raw);
    const urls = parsed.map ? Object.values(parsed.map).filter(function(u){ return u&&u.startsWith('http'); })
                            : (parsed.zeilen||[]).map(function(r){ return r[7]||''; }).filter(function(u){ return u.startsWith('http'); });
    if(!urls.length) return;
    const fn = function(){ urls.forEach(function(url){ const img=new Image(); img.src=url; }); };
    if(typeof requestIdleCallback === 'function'){
      requestIdleCallback(fn, {timeout:10000});
    } else {
      setTimeout(fn, 1500);
    }
  }catch(e){}
}
const _fotoBlobInflight=new Map();

// ── DrivePhotoCache: IndexedDB-Caching für Drive-Fotos ───────────────────
// Speichert heruntergeladene Blobs lokal. Vor erneutem Download wird
// das modifiedTime aus Drive-Metadaten geprüft – nur bei Änderung neu laden.
const DrivePhotoCache = {
  _db: null,
  _DB_NAME: 'drive-photo-cache-v1',
  _STORE: 'blobs',
  async _open() {
    if (this._db) return this._db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this._DB_NAME, 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore(this._STORE, { keyPath: 'id' });
      };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror = () => reject(req.error);
    });
  },
  async get(driveId) {
    try {
      const db = await this._open();
      return new Promise(resolve => {
        const req = db.transaction(this._STORE,'readonly').objectStore(this._STORE).get(driveId);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    } catch(e) { return null; }
  },
  async put(driveId, arrayBuffer, mimeType, modifiedTime) {
    try {
      const db = await this._open();
      return new Promise(resolve => {
        const tx = db.transaction(this._STORE,'readwrite');
        tx.objectStore(this._STORE).put({
          id: driveId,
          buf: arrayBuffer,
          mime: mimeType || 'image/jpeg',
          modifiedTime: modifiedTime || '',
          cachedAt: Date.now()
        });
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      });
    } catch(e) {}
  },
  createBlobUrl(entry) {
    if (!entry || !entry.buf) return null;
    return URL.createObjectURL(new Blob([entry.buf], { type: entry.mime || 'image/jpeg' }));
  }
};
// ── Hole Foto-Blob mit IndexedDB-Cache + modifiedTime-Vergleich ───────────
async function _fetchFotoBlobCached(driveId, token) {
  if (!driveId || !token) return null;
  try {
    // 1) Cache-Eintrag prüfen
    const cached = await DrivePhotoCache.get(driveId);
    // Schnellpfad: Cache-Eintrag juenger als 30 Min -> kein API-Call
    if (cached && cached.cachedAt && (Date.now() - cached.cachedAt) < 30 * 60 * 1000) {
      const url = DrivePhotoCache.createBlobUrl(cached);
      if (url) return url;
    }
    // 2) Metadaten holen (modifiedTime) – günstiger als Blob
    let remoteModTime = '';
    try {
      const mr = await fetch(
        'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(driveId) + '?fields=modifiedTime',
        { headers: { Authorization: 'Bearer ' + token } }
      );
      if (mr.ok) {
        const meta = await mr.json();
        remoteModTime = meta.modifiedTime || '';
      }
    } catch(e) { /* best-effort */ }
    // 3) Cache treffer?
    if (cached && remoteModTime && cached.modifiedTime === remoteModTime) {
      const url = DrivePhotoCache.createBlobUrl(cached);
      if (url) return url;
    }
    // 4) Neu von Drive laden
    const r = await fetch(
      'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(driveId) + '?alt=media',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const buf = await r.arrayBuffer();
    const ct = r.headers.get('content-type') || 'image/jpeg';
    await DrivePhotoCache.put(driveId, buf, ct, remoteModTime);
    return URL.createObjectURL(new Blob([buf], { type: ct }));
  } catch(e) {
    console.warn('[DrivePhotoCache] Fehler für', driveId, e);
    return null;
  }
}

async function _fetchFotoBlob(driveId){
  if(!driveId)return null;
  // In-Memory-Cache zuerst
  if(_fotoBlobCache.has(driveId))return _fotoBlobCache.get(driveId);
  if(_fotoBlobInflight.has(driveId))return _fotoBlobInflight.get(driveId);
  // HV-Bild IndexedDB pruefen: wenn HV-Bild das Vorschaubild bereits gecacht hat
  // (gleiche Origin -> gleiche IndexedDB), sofort zurueckgeben ohne API-Call.
  const hvCached = await _hvBildIdbLookup(driveId);
  if (hvCached) { _fotoBlobCache.set(driveId, hvCached); return hvCached; }
  const p=(async()=>{
    if(!(await ensureToken()))throw new Error('Kein Token');
    // IndexedDB-Cache mit modifiedTime-Vergleich
    const url=await _fetchFotoBlobCached(driveId, gdriveToken);
    if(url)_fotoBlobCache.set(driveId,url);
    return url;
  })();
  _fotoBlobInflight.set(driveId,p);
  try{const url=await p;return url;}
  catch(e){console.warn('Thumb-Fetch fehlgeschlagen für',driveId,e);return null;}
  finally{_fotoBlobInflight.delete(driveId);}
}
// ── Schnelles Thumbnail via Drive thumbnailLink (~20-50 KB statt 5-10 MB) ──────
// Beim ersten Aufruf: 1 kleiner Metadaten-Request → thumbnailLink → Thumbnail laden.
// Fallback: _fetchFotoBlob (Vollbild), wenn kein thumbnailLink vorhanden.
// Lightbox nutzt weiterhin _fetchFotoBlob für volle Auflösung.
const _mobThumbCache = new Map(); // driveId → blobUrl (nur aktuelle Sitzung)

async function _mobFetchThumb(driveId) {
  if (!driveId) return null;
  // 1. In-Memory-Cache (Sitzung)
  if (_mobThumbCache.has(driveId)) return _mobThumbCache.get(driveId);
  // 2. Vollbild bereits geladen? → direkt weiternutzen
  if (_fotoBlobCache.has(driveId)) return _fotoBlobCache.get(driveId);
  if (!gdriveToken) return null;
  try {
    // 3. thumbnailLink aus Drive-Metadaten (nur ~2 KB)
    const metaR = await fetch(
      'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(driveId) + '?fields=thumbnailLink',
      { headers: { Authorization: 'Bearer ' + gdriveToken } }
    );
    if (metaR.ok) {
      const { thumbnailLink } = await metaR.json();
      if (thumbnailLink) {
        // 4. Thumbnail laden – zuerst direkt (Google-CDN-URL, oft ohne Auth nutzbar),
        //    dann mit Bearer-Token als Fallback.
        let thumbR = null;
        try { thumbR = await fetch(thumbnailLink); } catch(_) {}
        if (!thumbR || !thumbR.ok) {
          try { thumbR = await fetch(thumbnailLink, { headers: { Authorization: 'Bearer ' + gdriveToken } }); } catch(_) {}
        }
        if (thumbR && thumbR.ok) {
          const blob = await thumbR.blob();
          if (blob.size > 1000) { // Winzige Platzhalter-Bilder überspringen
            const url = URL.createObjectURL(blob);
            _mobThumbCache.set(driveId, url);
            return url;
          }
        }
      }
    }
  } catch(e) { console.warn('[PAM] _mobFetchThumb Fehler:', driveId, e.message); }
  // 5. Fallback: Vollbild (zuverlässig aber langsam)
  return _fetchFotoBlob(driveId);
}

async function loadFotoThumb(imgEl,driveId){
  if(!imgEl||!driveId)return;
  const url=await _fetchFotoBlob(driveId);
  if(url){
    imgEl.style.display='';
    if(imgEl.parentElement)imgEl.parentElement.classList.remove('fallback');
    imgEl.src=url;
  }
  else{imgEl.style.display='none';const p=imgEl.parentElement;if(p)p.classList.add('fallback');}
}
function hydrateFotoThumbs(){
  document.querySelectorAll('img[data-foto-id]').forEach(img=>{
    if(img.dataset.hydrated==='1')return;
    const id=img.getAttribute('data-foto-id');
    if(id){img.dataset.hydrated='1';loadFotoThumb(img,id);}
  });
}
// Fallback wenn thumbnail-URL abgelaufen: Auth-Fetch (blob) nachladen
function _mobThumbFallback(img){
  if(img.dataset.fbDone==='1')return;
  img.dataset.fbDone='1';
  const id=img.getAttribute('data-foto-id');
  if(id&&gdriveToken){
    img.removeAttribute('onerror');
    _fetchFotoBlob(id).then(u=>{
      if(u){img.src=u;img.style.display='';}
      else{img.style.display='none';if(img.parentElement)img.parentElement.classList.add('fallback');}
    });
  } else {
    img.style.display='none';
    if(img.parentElement)img.parentElement.classList.add('fallback');
  }
}
function renderFotos(list){
  if(!list||!list.length)return '';
  return list.map((f,i)=>{
    const name=f.name||'';
    // Bearbeitete Version bevorzugen (editedDriveId)
    const id=(f.editedDriveId||f.driveId)||'';
    const caption=f.caption||'';
    const cached=id?_fotoBlobCache.get(id):null;
    // COMPAT-FIX: Desktop speichert 'thumbnailLink', Mobile speichert 'thumbnail' –
    // beide Feldnamen prüfen, damit Fotos aus beiden Apps korrekt angezeigt werden.
    const thumbSrc=f.thumbnail||f.thumbnailLink||_hvBildCacheLookupMob(id)||(id?'https://drive.google.com/thumbnail?id='+id+'&sz=w400':'');
    // localUrl als Sofort-Vorschau wenn kein Cache und keine Drive-ID (Upload läuft noch)
    const localFallback=(!cached&&!id&&f.localUrl)?f.localUrl:'';
    const srcAttr=cached?('src="'+escAttr(cached)+'" ')
                 :(id?'data-foto-id="'+escAttr(id)+'" src="'+escAttr(thumbSrc)+'" '
                     :(localFallback?'src="'+escAttr(localFallback)+'" '
                     :(thumbSrc?'src="'+escAttr(thumbSrc)+'" ':'')));
    const tip=caption?(caption+' — '+name):name;
    const editedBadge=f.editedDriveId?'<span style="position:absolute;top:3px;left:3px;background:var(--accent);color:#fff;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">✏</span>':'';
    const uploadOverlay=f._uploading?'<div class="foto-upload-overlay"><span class="up-icon">⬆</span><span class="up-lbl">lädt hoch…</span></div>':'';
    return '<div class="foto-thumb" onclick="openFotoFullscreen('+i+')" title="'+escAttr(tip)+'">'
      +'<img '+srcAttr+'alt="" loading="lazy" onerror="_mobThumbFallback(this)">'
      +editedBadge
      +uploadOverlay
      +'<button class="del" onclick="event.stopPropagation();removeFoto('+i+')">✕</button>'
      +'<button style="position:absolute;top:2px;right:26px;background:rgba(0,0,0,.6);color:#fff;border:none;width:22px;height:22px;border-radius:11px;font-size:11px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;" onclick="event.stopPropagation();shareFoto('+i+')" title="Teilen">📤</button>'
      +(caption?'<div class="cap-badge">'+esc(caption)+'</div>':'')
      +'</div>';
  }).join('');
}
function attachIconMob(type){
  if(!type)return'📄';
  if(type.startsWith('image/'))return'🖼️';
  if(type==='application/pdf')return'📕';
  if(type.includes('word'))return'📝';
  if(type.includes('excel')||type.includes('sheet'))return'📊';
  if(type.includes('zip')||type.includes('rar'))return'🗜️';
  return'📄';
}
function formatBytesMob(n){if(!n)return'';if(n<1024)return n+' B';if(n<1024*1024)return Math.round(n/1024)+' KB';return (n/1024/1024).toFixed(1)+' MB';}
function renderAttachmentsMob(list){
  if(!list||!list.length)return '';
  return list.map((a,i)=>{
    const isImg=a.type&&a.type.startsWith('image/');
    const fid=a.driveId||a.fileId||'';
    // Thumbnail: data-URL (desktop-Uploads) ODER Drive-Thumbnail-URL über fileId
    const thumbSrc=a.data||(fid?'https://drive.google.com/thumbnail?id='+fid+'&sz=w120':'');
    return '<div class="attach-row-mob" onclick="openAttachMob('+i+')" style="cursor:pointer">'
      +(isImg&&thumbSrc
        ?'<img class="attach-thumb-mob" src="'+escAttr(thumbSrc)+'" onerror="this.outerHTML=\'<div class=\\\'attach-icon-mob\\\'>'+attachIconMob(a.type)+'</div>\'">'
        :'<div class="attach-icon-mob">'+attachIconMob(a.type)+'</div>')
      +'<div class="attach-meta-mob"><div class="attach-name-mob">'+esc(a.name||'Datei')+'</div><div class="attach-size-mob">'+formatBytesMob(a.size)+'</div></div>'
      +'<button class="inline-btn" style="padding:6px 10px;font-size:12px" onclick="event.stopPropagation();downloadAttachMob('+i+')">↓</button>'
      +'</div>';
  }).join('');
}
function openAttachMob(i){
  _openAttachGalleryMob(i);
}
// ── Anhang öffnen/anzeigen ────────────────────────────────────────────────────
async function _openAttachGalleryMob(i){
  const t=currentTask();if(!t||!t.attachments||!t.attachments[i])return;
  const a=t.attachments[i];
  const fid=a.driveId||a.fileId||'';
  const name=a.name||'Datei';
  const isImg=a.type&&a.type.startsWith('image/');
  const isPdf=(a.type==='application/pdf')||(name.toLowerCase().endsWith('.pdf'));

  // Bild: Lightbox mit Drive-Fetch
  if(isImg&&fid){
    if(!(await ensureToken()))return;
    const viewUrl='https://drive.google.com/file/d/'+fid+'/view';
    const thumbSrc=a.data||('https://drive.google.com/thumbnail?id='+fid+'&sz=w400');
    openLightbox(thumbSrc,name,viewUrl,{});
    const blob=await _fetchFotoBlob(fid);
    const lb=document.getElementById('lightbox');
    const img=document.getElementById('lbImg');
    if(blob&&img&&lb&&lb.classList.contains('open')){
      img.src=blob;if(img.style.display==='none')img.style.display='';
    }
    return;
  }
  // PDF oder Drive-Datei → in neuem Tab öffnen (sicherster Weg auf iOS)
  const driveUrl=a.url||(fid?'https://drive.google.com/file/d/'+fid+'/view':'');
  if(driveUrl){
    window.open(driveUrl,'_blank');
    return;
  }
  // Nur data-URL (kein Drive-Link)
  if(a.data){
    const w=window.open('','_blank');
    if(w){w.document.write('<html><body style="margin:0"><iframe src="'+a.data+'" style="width:100%;height:100vh;border:none"></iframe></body></html>');w.document.close();}
    return;
  }
  toast('Datei nicht verfügbar','error');
}

      <button onclick="document.getElementById('mobTextViewerOverlay').remove()" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;">✕</button>
    </div>

    </div>`;

}
function downloadAttachMob(i){
  const t=currentTask();if(!t||!t.attachments||!t.attachments[i])return;
  const a=t.attachments[i];
  if(a.data){
    const link=document.createElement('a');
    link.href=a.data;link.download=a.name||'datei';
    document.body.appendChild(link);link.click();document.body.removeChild(link);
  } else if(a.driveId||a.fileId){
    window.open('https://drive.google.com/file/d/'+(a.driveId||a.fileId)+'/view','_blank');
  } else if(a.url){
    window.open(a.url,'_blank');
  } else {
    toast('Keine Datei verfügbar','error');
  }
}

  document.body.appendChild(ov);

// ── DRIVE-ORDNER-LADER ──
async function loadFotosFromDriveFolder(){
  if(!gdriveToken){toast('Bitte zuerst mit Google Drive verbinden','error');return;}
  const taskId=currentTaskId;
  const task=findTaskById(taskId);
  const folderId=task?extractDriveFolderId(task.gdrive||''):null;
  if(!folderId){toast('Kein Foto-Ordner im Task eingetragen (Verknüpfungen)','error');return;}
  toast('⏳ Lade Fotos aus Drive…','info');
  try{
    const url='https://www.googleapis.com/drive/v3/files'
      +'?q='+encodeURIComponent("'"+folderId+"' in parents and (mimeType contains 'image/') and trashed=false")
      +'&fields='+encodeURIComponent('files(id,name,mimeType,thumbnailLink,createdTime)')
      +'&orderBy=createdTime+desc&pageSize=100';
    const r=await fetch(url,{headers:{Authorization:'Bearer '+gdriveToken}});
    if(!r.ok){

}

// Zieht die Drive-Ordner-ID aus einer URL wie
// https://drive.google.com/drive/u/0/folders/1MvhZG... oder https://drive.google.com/drive/folders/1MvhZG...
function extractDriveFolderId(url){
  if(!url)return null;
  const m=String(url).match(/\/folders\/([a-zA-Z0-9_-]+)/);
  if(m)return m[1];
  // Falls nur die ID eingetragen ist
  const m2=String(url).trim().match(/^([a-zA-Z0-9_-]{20,})$/);
  return m2?m2[1]:null;
}
async function _uploadOneFotoToDrive(file,folderId){
  const ts=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const stamp=ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'_'+pad(ts.getHours())+pad(ts.getMinutes())+pad(ts.getSeconds());
  // Sinnvoller Dateiname: Zeitstempel_Originalname
  const origName=file.name||'foto.jpg';
  const safeName=stamp+'_'+origName.replace(/[^\w.\-]+/g,'_');
  const metadata={name:safeName,parents:[folderId],description:'PAM Mobile Upload'};
  const body=new FormData();
  body.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  body.append('file',file);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size,mimeType,thumbnailLink,webViewLink,webContentLink',
    {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body});
  if(!r.ok){const txt=await r.text().catch(()=>'');throw new Error('HTTP '+r.status+(txt?': '+txt.slice(0,120):''));}
  return await r.json();
}
async function uploadFoto(files){
  if(!files||!files.length)return;
  const fileArr=Array.from(files);
  const t=currentTask();
  if(!t){toast('Keine Task geöffnet','error');return;}
  const folderId=extractDriveFolderId(t.gdrive);
  if(!folderId){
    toast('❗ Foto-Ordner fehlt – bitte am Desktop unter Verknüpfungen eintragen','error');
    _mOpenSections['Fotos']=true;
    renderDetail(t);
    return;
  }
  if(!(await ensureToken())){toast('Nicht angemeldet','error');return;}
  if(!t.fotos)t.fotos=[];

  // ── Schritt 1: Fotos SOFORT anzeigen (Blob-URL) + Upload-Spinner ──────────
  const fotoObjs=fileArr.map(file=>{
    const localUrl=URL.createObjectURL(file);
    const fo={
      name:file.name,
      mimeType:file.type||'image/jpeg',
      size:file.size||0,
      localUrl,
      driveId:null,
      _uploading:true,
      uploadedAt:new Date().toISOString(),
      source:'mobile'
    };
    t.fotos.push(fo);
    return{file,fo};
  });
  _mOpenSections['Fotos']=true;
  renderDetail(t); // Foto erscheint sofort mit Spinner

  // ── Schritt 2: Upload im Hintergrund ──────────────────────────────────────
  let success=0,failed=0,lastErr='';
  await Promise.all(fotoObjs.map(async({file,fo})=>{
    try{
      const meta=await _uploadOneFotoToDrive(file,folderId);
      // Blob-URL im Thumbnail-Cache eintragen (für Grid-Vorschau)
      _fotoBlobCache.set(meta.id,fo.localUrl);
      // Foto-Objekt in-place aktualisieren (Index bleibt gleich)
      fo.driveId=meta.id;
      fo.name=meta.name||fo.name;
      fo.thumbnail=meta.thumbnailLink||('https://drive.google.com/thumbnail?id='+meta.id+'&sz=w400');
      fo.url=meta.webViewLink||('https://drive.google.com/file/d/'+meta.id+'/view');
      fo.download=meta.webContentLink||'';
      fo._uploading=false;
      success++;
    }catch(e){
      fo._uploading=false;
      fo._uploadError=true;
      failed++;lastErr=e.message||String(e);
      console.error('Foto-Upload-Fehler:',e);
    }
  }));

  // ── Schritt 3: Ergebnis ───────────────────────────────────────────────────
  forceSave();
  renderDetail(t); // Spinner entfernen, Drive-IDs jetzt bekannt
  if(success&&failed)toast('⚠ '+success+' hochgeladen, '+failed+' fehlgeschlagen','error');
  else if(!success)toast('✗ Upload fehlgeschlagen: '+lastErr,'error');
  // Erfolg: kein Toast – Foto ist bereits sichtbar im Grid, kein Extra-Hinweis nötig
}

  const btnStyle='padding:10px 18px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;font-weight:600;cursor:pointer;min-width:80px;';
  const prevBtn=document.createElement('button');prevBtn.type='button';prevBtn.textContent='◀ Zurück';prevBtn.style.cssText=btnStyle;
  prevBtn.onclick=()=>{if(cur>0){cur--;_showFoto();}};
  const driveBtn=document.createElement('a');driveBtn.target='_blank';driveBtn.rel='noopener';
  driveBtn.style.cssText='padding:10px 14px;border-radius:20px;background:rgba(255,255,255,.9);color:#000;font-size:12px;font-weight:700;text-decoration:none;text-align:center;display:inline-block;';
  driveBtn.textContent='📂 Drive';
  const nextBtn=document.createElement('button');nextBtn.type='button';nextBtn.textContent='Weiter ▶';nextBtn.style.cssText=btnStyle;
  nextBtn.onclick=()=>{if(cur<fotos.length-1){cur++;_showFoto();}};
  nav.append(prevBtn,driveBtn,nextBtn);

  ov.append(top,imgWrap,nav);
  document.body.appendChild(ov);

  function _showFoto(){
    const f=fotos[cur];if(!f)return;
    lbl.textContent=f.editedName||f.name||('Foto '+(cur+1));
    counter.textContent=fotos.length>1?((cur+1)+'/'+fotos.length):'';
    prevBtn.style.opacity=cur>0?'1':'0.3';
    nextBtn.style.opacity=cur<fotos.length-1?'1':'0.3';
    imgEl.src='';imgEl.alt='Lade…';
    // Drive-Link
    const vid=f.editedDriveId||f.driveId||'';
    driveBtn.href=vid?'https://drive.google.com/file/d/'+vid+'/view':'#';
    driveBtn.style.display=vid?'':'none';
    // Bild laden
    if(f.localUrl&&(f.localUrl.startsWith('data:')||f.localUrl.startsWith('blob:'))){
      imgEl.src=f.localUrl;imgEl.alt='';
    }else if(f.localKey&&!f.driveId){
      if(f.thumbnail){imgEl.src=f.thumbnail;imgEl.alt='';}
      _mobPhotoGet(f.localKey).then(url=>{if(url){f.localUrl=url;imgEl.src=url;imgEl.alt='';}else if(!imgEl.src)imgEl.alt='Kein Bild verfügbar';});
    }else if(f.driveId){
      // Sofort Thumbnail zeigen, dann Vollbild
      const thumb=f.thumbnail||f.thumbnailLink||(typeof _mobThumbCache!=='undefined'?_mobThumbCache.get(f.driveId):null)||'';
      if(thumb){imgEl.src=thumb;imgEl.alt='';}
      if(typeof gdriveToken!=='undefined'&&gdriveToken){
        fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(f.driveId)+'?alt=media',{headers:{Authorization:'Bearer '+gdriveToken}})
          .then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);f.localUrl=u;imgEl.src=u;imgEl.alt='';})
          .catch(()=>{if(!imgEl.getAttribute('src'))imgEl.alt='Bild nicht verfügbar';});
      }else if(!imgEl.getAttribute('src')){imgEl.alt='Nicht eingeloggt';}
    }else{imgEl.alt='Kein Bild';}
  }

  // Wisch-Geste (Swipe left/right)
  let _tx=0;
  imgWrap.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
  imgWrap.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_tx;
    if(Math.abs(dx)>50){if(dx<0&&cur<fotos.length-1){cur++;_showFoto();}else if(dx>0&&cur>0){cur--;_showFoto();}}
  },{passive:true});

  _showFoto();
}
async function removeFoto(i){

  const f=t.fotos[i];

}

async function _mobDriveCreateFolder(name,parentId){
  const r=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  return(await r.json()).id;
}
async function _mobDriveCreateTextFile(name,content,parentId){
  const meta={name,mimeType:'text/plain',parents:[parentId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([content],{type:'text/plain;charset=utf-8'}));
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
}
async function createAbschlussakteMobile(){

  document.querySelectorAll('.theme-toggle-btn').forEach(btn=>{
    btn.textContent=isLight?'🌙':'☀️';
    btn.title=isLight?'Dunkel-Modus':'Hell-Modus (Sonnenlicht)';
  });
  // Einstellungs-Buttons hervorheben
  const bl=document.getElementById('themeBtnLight');
  const bd=document.getElementById('themeBtnDark');
  if(bl)bl.style.fontWeight=isLight?'700':'400';
  if(bd)bd.style.fontWeight=isLight?'400':'700';
  try{localStorage.setItem(THEME_KEY,mode);}catch(e){console.warn('[PTP-Mobile]',e);}
}
function toggleTheme(){
  setTheme(document.body.classList.contains('light')?'dark':'light');
}
function applyStoredTheme(){
  try{const t=localStorage.getItem(THEME_KEY);setTheme(t||'dark');}catch(e){console.warn('[PTP-Mobile]',e);setTheme('dark');}
}

// ══ SETTINGS ══
function openSettings(){
  document.getElementById('settingsScreen').classList.remove('hidden');
  document.getElementById('listScreen').classList.add('hidden');
  document.getElementById('settFileName').textContent=fileName||'(noch nicht verbunden)';
  document.getElementById('settUserEmail').textContent=userEmail||'(unbekannt)';
  // Versionsnummer aus Service-Worker-Cache-Namen auslesen (z.B. "pam-mobil-v9" → "v9")
  (async()=>{
    try{
      const el=document.getElementById('settAppVersion');if(!el)return;
      if(!('caches' in window)){el.textContent='PAM Mobile';return;}
      const keys=await caches.keys();
      const k=keys.find(k=>k.startsWith('pam-mobil-'));
      el.textContent=k?'PAM Mobile – '+k.replace('pam-mobil-',''):'PAM Mobile';
    }catch(e){const el=document.getElementById('settAppVersion');if(el)el.textContent='PAM Mobile';}
  })();
}
function closeSettings(){
  document.getElementById('settingsScreen').classList.add('hidden');
  document.getElementById('listScreen').classList.remove('hidden');
}
async function connectManualFile(){
  const inp=document.getElementById('manualFileInput');
  const val=(inp?inp.value:'').trim();
  if(!val){toast('Bitte eine Drive-URL oder Datei-ID eingeben','error');return;}
  // ID aus URL extrahieren
  let id=val;
  const m=val.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||val.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if(m)id=m[1];
  if(!id||id.length<10){toast('Ungültige Drive-URL oder ID','error');return;}
  if(!(await ensureToken())){toast('Bitte zuerst anmelden','error');return;}
  toast('⏳ Verbinde…','info');
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?fields=id,name,mimeType',{headers:{Authorization:'Bearer '+gdriveToken}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const meta=await r.json();
    fileId=meta.id;fileName=meta.name||'workboard.json';
    try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){}
    const ok=await loadFile();
    if(ok){if(inp)inp.value='';closeSettings();renderList();toast('✓ Verbunden: '+fileName,'success');}
    else{toast('Datei konnte nicht geladen werden','error');}
  }catch(e){toast('Fehler: '+e.message,'error');}
}
async function searchAndConnectFile(){
  if(!(await ensureToken())){toast('Bitte zuerst anmelden','error');return;}
  toast('🔍 Suche workboard.json…','info');
  try{
    const found=await _searchWorkboardInDrive();
    if(!found){toast('Keine workboard.json gefunden','error');return;}
    fileId=found.id;fileName=found.name||'workboard.json';
    try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){}
    const ok=await loadFile();
    if(ok){closeSettings();renderList();toast('✓ Verbunden: '+fileName,'success');}
    else{toast('Datei konnte nicht geladen werden','error');}
  }catch(e){toast('Fehler: '+e.message,'error');}
}
