<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; connect-src 'self' blob: https://*.googleapis.com https://accounts.google.com https://www.googleapis.com https://oauth2.googleapis.com https://lh3.googleusercontent.com https://api.open-meteo.com https://europe-west1-ptp-workboard.cloudfunctions.net; img-src 'self' data: blob: https://*.googleusercontent.com https://drive.google.com https://lh3.googleusercontent.com; style-src 'self' 'unsafe-inline'; frame-src https://accounts.google.com; worker-src blob: 'self';">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PAM Mobile">
<title>PAM Mobile</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#242438;--text:#e8e8f0;--text2:#9090a8;--accent:#6a8aff;--accent2:#8aa0ff;--green:#4ade80;--orange:#fb923c;--red:#f87171;--border:#333350;}
/* ── HELL-MODUS (Sonnenlicht) ── */
body.light{--bg:#ffffff;--bg2:#f2f2f7;--bg3:#e5e5ea;--text:#1c1c1e;--text2:#6c6c80;--accent:#3a6adf;--accent2:#5a86f5;--green:#1a8a3c;--orange:#c96a00;--red:#c0392b;--border:#c8c8d4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;height:100%;overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.screen.hidden{display:none}
/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:56px;position:sticky;top:0;z-index:10}
.hdr-title{flex:1;font-weight:600;font-size:19px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:16px;cursor:pointer;min-width:48px;min-height:48px;display:inline-flex;align-items:center;justify-content:center}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.hdr-btn.icon{padding:10px 12px;font-size:20px}
/* ── LOGIN ── */
#loginScreen{justify-content:center;align-items:center;padding:24px;text-align:center}
#loginScreen h1{font-size:28px;margin:0 0 12px}
#loginScreen p{color:var(--text2);margin:0 0 32px;max-width:320px;line-height:1.5}
#loginBtn{background:var(--accent);color:white;border:none;padding:16px 28px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
#loginBtn:active{opacity:.85}
.login-status{margin-top:16px;color:var(--text2);font-size:13px}
/* ── LIST ── */
.board-section{background:var(--bg2);border-bottom:2px solid var(--accent);padding:10px 12px 12px}
.board-section-label{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent2);font-weight:600;margin-bottom:6px}
.board-section-label::before{content:'📋';font-size:14px}
.board-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.board-bar::-webkit-scrollbar{display:none}
.board-chip{background:var(--bg3);border:2px solid var(--border);color:var(--text);padding:12px 18px;border-radius:22px;font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:48px;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.board-chip:active{transform:scale(.96)}
.board-chip.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;box-shadow:0 2px 8px rgba(106,138,255,.3)}
/* ── STATUS-LEISTE ── */
.status-section{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px 10px}
.status-chip{background:var(--bg3);border:2px solid var(--border);color:var(--text2);padding:9px 15px;border-radius:18px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:42px;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.status-chip:active{transform:scale(.96)}
.status-chip.active{background:var(--bg2);border-color:var(--orange);color:var(--orange);font-weight:600}
.search-bar{padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.search-bar{position:relative}
.search-bar input{width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 40px 13px 14px;border-radius:10px;font-size:16px}
.search-clear{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px;line-height:1;display:none}
.task-list{flex:1;overflow-y:auto;padding:8px 10px 80px;-webkit-overflow-scrolling:touch}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background .15s;display:flex;gap:10px;align-items:stretch}
.task-card:active{background:var(--bg3)}
.task-card-body{flex:1;min-width:0}
.task-card-title{font-weight:600;font-size:17px;margin:0 0 6px;line-height:1.3}
.task-card-meta{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text2);flex-wrap:wrap}
.card-foto-wrap{width:62px;height:62px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);position:relative;align-self:center;display:flex;align-items:center;justify-content:center}
.card-foto-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.card-foto-cnt{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.72);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;line-height:1.4}
.card-foto-icon{font-size:20px;color:var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border)}
.badge.status{background:rgba(106,138,255,.15);border-color:var(--accent);color:var(--accent2)}
/* ── BAUDOKU TAB-BAR ── */
.detail-tab-bar{display:flex;background:var(--bg2);border-bottom:2px solid var(--border);flex-shrink:0;}
.detail-tab-btn{flex:1;padding:11px 8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px;min-height:44px;}
.detail-tab-btn.active{color:var(--text);border-bottom-color:var(--accent);}
/* ── BAUDOKU INHALTE ── */
.bau-textarea{width:100%;min-height:80px;resize:vertical;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:calc(15px * var(--m-scale,1));font-family:inherit;box-sizing:border-box;}
.bau-sect-summary{font-size:calc(11px * var(--m-scale,1));font-weight:400;color:var(--text2);margin-top:1px;display:block;}
.bau-mat-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.bau-mat-name{font-size:calc(13px * var(--m-scale,1));font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bau-mat-meta{font-size:calc(11px * var(--m-scale,1));color:var(--text2);}
.bau-mat-val{background:var(--bg);border:1px solid var(--accent);border-radius:6px;padding:5px 8px;font-size:14px;font-weight:700;color:var(--accent2);min-width:50px;text-align:center;width:50px;}
.bau-wetter-row{display:flex;gap:7px;margin-top:4px;}
.bau-wetter-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-height:44px;}
.bau-wetter-btn.active{border-color:var(--accent);background:rgba(106,138,255,.12);}
.bau-wetter-icon{font-size:22px;line-height:1;}
.bau-wetter-lbl{font-size:10px;color:var(--text2);}
.bau-wetter-btn.active .bau-wetter-lbl{color:var(--accent2);}
/* ── Diktat aktiv ── */
@keyframes bauMicPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5);}50%{box-shadow:0 0 0 6px rgba(248,113,113,0);}}
.bau-diktat-btn.recording{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red);animation:bauMicPulse 1.2s infinite;}
.bau-diktat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:5px;vertical-align:middle;}
/* ── Baudoku-Timer ── */
.bau-timer-display{background:rgba(74,222,128,.1);border:1px solid var(--green);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.bau-timer-uhr{font-size:20px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.bau-timer-lbl{font-size:12px;color:var(--text2);}
/* ── Wetter erweitert ── */
.bau-wetter-fetched{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;margin-top:8px;font-size:13px;}
.bau-wetter-temp{font-size:calc(22px * var(--m-scale,1));font-weight:700;color:var(--accent2);}
.bau-wetter-notiz{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:14px;font-family:inherit;margin-top:8px;box-sizing:border-box;}
.bau-person-chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 13px;font-size:calc(13px * var(--m-scale,1));color:var(--text2);cursor:pointer;min-height:40px;margin:0 5px 5px 0;}
.bau-person-chip.active{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green);font-weight:600;}
.bau-separator{font-size:calc(10px * var(--m-scale,1));text-transform:uppercase;letter-spacing:.6px;color:var(--text2);padding:10px 2px 4px;font-weight:600;}
.bau-masch-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:5px;}
.bau-masch-name{font-size:calc(14px * var(--m-scale,1));font-weight:600;flex:1;}
.bau-masch-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:2px 6px;}
.bau-sect-head-inner{display:flex;flex-direction:column;gap:2px;text-align:left;}
/* ── Baudoku: Tages-Header ── */
.bau-tages-header{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bau-tages-date{font-size:calc(13px * var(--m-scale,1));font-weight:700;color:var(--text);}
.bau-tages-chip{font-size:calc(12px * var(--m-scale,1));background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:3px 9px;color:var(--text2);}
.bau-tages-stat{font-size:calc(11px * var(--m-scale,1));color:var(--accent2);background:rgba(106,138,255,.1);border-radius:10px;padding:2px 8px;font-weight:600;}
/* ── Baudoku: Stoppuhr ── */
.bau-timer-bar{position:sticky;top:0;z-index:5;background:var(--bg2);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 16px 16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.18);overflow:hidden;}
.bau-timer-bar.running{border-color:var(--orange);}
.bau-timer-bar.collapsed{border:none;border-radius:0;box-shadow:none;margin:0;background:transparent;}
.bau-timer-strip{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-bottom:2px solid var(--accent);cursor:pointer;min-height:44px;}
.bau-timer-strip.running{border-bottom-color:var(--orange);}
.bau-timer-strip-dot{width:7px;height:7px;border-radius:50%;background:var(--text2);flex-shrink:0;}
.bau-timer-strip-dot.pulse{background:var(--green);animation:bauDotPulse 1.2s infinite;}
@keyframes bauDotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}
.bau-timer-strip-time{font-family:'SF Mono',Consolas,monospace;font-size:16px;font-weight:700;letter-spacing:1px;color:var(--accent);}
.bau-timer-strip.running .bau-timer-strip-time{color:var(--orange);}
.bau-timer-strip-desc{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bau-timer-head{display:flex;align-items:center;gap:10px;padding:11px 14px 4px;cursor:pointer;user-select:none;}
.bau-timer-head-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;flex:1;color:var(--text2);}
.bau-timer-head-lbl.running{color:var(--orange);}
.bau-timer-body{padding:0 14px 13px;}
.bau-timer-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bau-timer-big{font-family:'SF Mono',Consolas,monospace;font-size:calc(34px * var(--m-scale,1));font-weight:800;letter-spacing:2px;flex:1;color:var(--accent);}
.bau-timer-bar.running .bau-timer-big{color:var(--orange);}
.bau-timer-bar-desc{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:calc(14px * var(--m-scale,1));color:var(--text);font-family:inherit;outline:none;}
.bau-timer-bar-desc::placeholder{color:var(--text2);}
/* ── Baudoku: Fotos ── */
.bau-foto-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.bau-foto-sect-head{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none;}
.bau-foto-sect-icon{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.bau-foto-sect-lbl{font-size:14px;font-weight:700;flex:1;}
.bau-foto-sect-badge{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:2px 8px;font-weight:600;}
.bau-foto-sect-body{padding:0 13px 13px;}
.bau-foto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:9px;}
.bau-foto-grid-thumb{aspect-ratio:1;border-radius:10px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;cursor:pointer;position:relative;}
.bau-foto-grid-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:block;}
.bau-foto-grid-add{aspect-ratio:1;border-radius:10px;border:1.5px dashed rgba(106,138,255,.5);background:rgba(106,138,255,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;}
.bau-foto-grid-add-icon{font-size:20px;color:var(--accent);}
.bau-foto-grid-add-lbl{font-size:9px;color:var(--accent);font-weight:700;letter-spacing:.3px;}
.bau-foto-btns{display:flex;gap:7px;}
.bau-foto-btn{flex:1;padding:10px 0;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;}
.bau-foto-btn.primary{background:rgba(106,138,255,.13);border-color:rgba(106,138,255,.5);color:var(--accent);}
/* ── Baudoku: Notizen ── */
.bau-notiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.bau-notiz-card-head{display:flex;align-items:center;gap:9px;padding:12px 14px 8px;}
.bau-notiz-card-icon{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.bau-notiz-card-lbl{font-size:14px;font-weight:700;flex:1;}
.bau-notiz-card-badge{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:2px 8px;font-weight:600;}
.bau-notiz-input-area{padding:0 13px 11px;}
.bau-notiz-quick{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;font-size:calc(15px * var(--m-scale,1));font-family:inherit;color:var(--text);outline:none;min-height:52px;resize:none;line-height:1.45;overflow:hidden;display:block;margin-bottom:8px;transition:border-color .15s;}
.bau-notiz-quick:focus{border-color:var(--accent);}
.bau-notiz-quick::placeholder{color:var(--text2);}
.bau-notiz-action-row{display:flex;gap:7px;}
.bau-notiz-action-btn{flex:1;padding:11px 0;border-radius:11px;font-size:calc(13px * var(--m-scale,1));font-weight:700;border:none;cursor:pointer;text-align:center;}
.bau-notiz-action-btn.confirm{background:var(--accent);color:#fff;}
.bau-notiz-action-btn.mic{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.bau-notiz-action-btn.mic.recording{background:rgba(248,113,113,.15);color:var(--red);border-color:var(--red);}
.bau-notiz-log-toggle{display:flex;align-items:center;gap:8px;padding:9px 13px;border-top:1px solid var(--border);cursor:pointer;user-select:none;}
.bau-notiz-log-toggle-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);flex:1;}
.bau-notiz-log-toggle-badge{font-size:11px;background:var(--bg3);color:var(--text2);border-radius:6px;padding:2px 7px;font-weight:600;}
.bau-notiz-log-toggle-arr{font-size:13px;color:var(--text2);display:inline-block;transition:transform .2s;}
.bau-notiz-log-toggle-arr.open{transform:rotate(90deg);}
.bau-notiz-log{padding:0 13px 12px;display:flex;flex-direction:column;gap:7px;}
.bau-notiz-entry{background:var(--bg3);border-radius:11px;padding:9px 12px;position:relative;}
.bau-notiz-entry-ts{font-size:calc(10px * var(--m-scale,1));color:var(--text2);margin-bottom:3px;font-weight:600;}
.bau-notiz-entry-text{font-size:calc(14px * var(--m-scale,1));color:var(--text);line-height:1.45;padding-right:22px;}
.bau-notiz-entry-del{position:absolute;top:8px;right:9px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 4px;line-height:1;}
/* ── Compat-Aliase (alter Strip wird nicht mehr gerendert) ── */
.bau-notiz-input-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.bau-foto-strip-row{display:flex;gap:8px;overflow-x:auto;min-height:90px;}
.bau-foto-strip-thumb{width:80px;height:80px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg3);cursor:pointer;flex-shrink:0;}
.bau-foto-strip-thumb img{width:100%;height:100%;object-fit:cover;}
.bau-foto-strip-more{width:80px;height:80px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0;cursor:pointer;}
.bau-foto-strip-empty{font-size:12px;color:var(--text2);padding:4px 0;}
/* ── MATERIAL-SUCH-MODAL ── */
.mat-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;flex-direction:column;}
.mat-modal-box{background:var(--bg2);flex:1;display:flex;flex-direction:column;border-radius:16px 16px 0 0;margin-top:60px;overflow:hidden;}
.mat-modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;}
.mat-modal-search{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:10px;font-size:16px;font-family:inherit;}
.mat-modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px;min-width:40px;min-height:40px;}
.mat-modal-mic{background:rgba(106,138,255,.15);border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;white-space:nowrap;min-height:40px;}
.mat-modal-filter{padding:6px 12px;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;flex-shrink:0;scrollbar-width:none;}
.mat-modal-filter::-webkit-scrollbar{display:none;}
.mat-modal-fchip{display:inline-block;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;margin-right:5px;}
.mat-modal-fchip.active{background:rgba(106,138,255,.15);border-color:var(--accent);color:var(--accent2);font-weight:700;}
.mat-modal-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mat-modal-item{padding:12px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;}
.mat-modal-item:active{background:var(--bg3);}
.mat-modal-item-name{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.mat-modal-item-meta{font-size:11px;color:var(--text2);}
.mat-modal-item-ein{font-size:13px;color:var(--accent2);font-weight:600;flex-shrink:0;}
.mat-modal-empty{padding:30px 16px;text-align:center;color:var(--text2);font-size:14px;}
.badge.ampel-grün{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.badge.ampel-orange{background:rgba(251,146,60,.15);border-color:var(--orange);color:var(--orange)}
.badge.ampel-rot{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.m-dbox-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.m-dbox{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg3);}
.m-dbox.miss{background:#FCEBEB;border-color:#F7C1C1;}
.m-dbox-dot{width:6px;height:6px;border-radius:50%;border:1.5px solid;flex-shrink:0;}
.m-dbox-lbl{font-size:12px;color:var(--text2);font-weight:500;white-space:nowrap;}
.m-dbox-val{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;padding-left:2px;}
.m-dbox-val.miss{color:#A32D2D;}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--accent);color:white;border:none;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:20}
.fab:active{transform:scale(.95)}
.empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
/* ── DETAIL ── */
.detail-body{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch;--m-scale:1}
.sect{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sect-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;font-weight:600;font-size:calc(15px * var(--m-scale));text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.sect-head::after{content:'▸';transition:transform .15s;font-size:12px}
.sect.open .sect-head::after{transform:rotate(90deg)}
.sect-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);font-size:calc(16px * var(--m-scale))}
.sect.open .sect-body{display:block}
.sect-body-always{padding:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:calc(13px * var(--m-scale));color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-size:calc(16px * var(--m-scale));font-family:inherit}
.field textarea{min-height:80px;resize:vertical}
.expandable-ta.expanded{min-height:calc(260px * var(--m-scale));font-size:calc(15px * var(--m-scale));line-height:1.5}
/* ── GRÖSSEN-SLIDER (immer sichtbar im Detail) ── */
.size-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:9}
.size-bar-icon{font-size:14px;color:var(--text2)}
.size-bar input[type=range]{flex:1;accent-color:var(--accent);margin:0}
.size-bar-val{font-size:12px;color:var(--text);min-width:36px;text-align:center;font-variant-numeric:tabular-nums}
.size-bar-step{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;min-width:38px;height:34px;line-height:1;}
.size-bar-step-lg{font-size:14px;}
.size-bar-close{background:transparent;border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:17px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.field-row{display:flex;gap:8px;align-items:flex-end}
.field-row .field{flex:1;margin-bottom:0}
.inline-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:10px;font-size:15px;cursor:pointer;white-space:nowrap;min-height:50px}
.inline-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.inline-btn.danger{color:var(--red);border-color:var(--red)}
.termin-row,.zeit-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px}
.row-times{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.row-times input[type=date]{flex:1.5;min-width:0}
.row-times input[type=time]{flex:1;min-width:0}
.row-desc{display:flex;gap:6px;align-items:center}
.row-desc input[type=text]{flex:1;min-width:0}
.termin-row input,.zeit-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-size:15px;width:100%;box-sizing:border-box}
.rm-btn{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;height:44px;min-width:44px;cursor:pointer;font-size:18px;flex-shrink:0}
.add-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--accent2);padding:14px;border-radius:10px;margin-top:8px;cursor:pointer;font-size:16px}
.kontakt-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.kontakt-entry-head{display:flex;gap:6px;margin-bottom:8px}
.kontakt-entry-head select{flex:1;padding:8px;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px}
.call-link{background:var(--green);color:white;text-decoration:none;padding:14px 20px;border-radius:10px;font-size:17px;font-weight:700;display:inline-flex;align-items:center;gap:6px;min-height:54px;white-space:nowrap}
.call-link.disabled{background:var(--bg3);color:var(--text2);pointer-events:none}
.nav-link{background:var(--accent);color:white;text-decoration:none;padding:14px 20px;border-radius:10px;font-size:17px;font-weight:700;display:inline-flex;align-items:center;gap:6px;min-height:54px;white-space:nowrap}
.save-indicator{font-size:12px;color:var(--text2);min-width:80px;text-align:right}
.save-indicator.saving{color:var(--orange)}
.save-indicator.saved{color:var(--green)}
.save-indicator.error{color:var(--red)}
/* ── TIMER ── */
.timer-bar{display:flex;flex-direction:column;gap:7px;padding:10px 12px;background:#E8ECFF;border:1.5px solid var(--accent);border-radius:12px;margin-bottom:10px;width:100%;box-sizing:border-box}
.timer-bar.running{background:#FFF0DC;border-color:var(--orange)}
.timer-bar.top{position:sticky;top:0;z-index:5;margin:0 0 12px;border-width:2px;box-shadow:0 2px 10px rgba(0,0,0,.14);border-radius:0 0 12px 12px;border-top:none;}
.timer-bar.collapsed{padding:0;gap:0;background:transparent;border:none;box-shadow:none;margin:0;}
.timer-collapsed-strip{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#E8ECFF;border-bottom:2px solid var(--accent);cursor:pointer;min-height:38px;}
.timer-collapsed-strip.running{background:#FFF0DC;border-bottom-color:var(--orange);}
.timer-collapsed-time{font-family:'SF Mono',Consolas,monospace;font-size:16px;font-weight:700;letter-spacing:1px;color:#1a1a2e;}
.timer-collapsed-strip.running .timer-collapsed-time{color:#b45309;}
.timer-collapsed-desc{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timer-collapsed-expand{font-size:18px;color:var(--text2);flex-shrink:0;}
.timer-top-row{display:flex;align-items:center;gap:8px;width:100%}
.timer-display{flex:0 0 65%;font-family:'SF Mono',Consolas,monospace;font-size:26px;font-weight:700;letter-spacing:2px;color:#1a1a2e;line-height:1.1;min-width:0;overflow:hidden}
.timer-bar.running .timer-display{color:#b45309}
.timer-btn{flex:1;padding:0;border-radius:9px;font-weight:700;border:none;cursor:pointer;font-size:14px;height:44px;min-width:0}
.timer-btn.start{background:var(--accent);color:white}
.timer-btn.stop{background:var(--orange);color:white}
.qa-toggle{flex:0 0 44px;height:44px;background:rgba(0,0,0,.1);border:none;border-radius:9px;font-size:26px;font-weight:300;cursor:pointer;color:#1a1a2e;display:flex;align-items:center;justify-content:center;transition:transform .28s cubic-bezier(.34,1.56,.64,1),background .2s;line-height:1;flex-shrink:0}
.qa-toggle.open{transform:rotate(45deg);background:var(--orange);color:white}
/* ── SCHNELLAKTION-PANEL ── */
.qa-panel{display:none;flex-direction:column;gap:8px;background:#fff;border:1.5px solid var(--accent);border-radius:11px;overflow:hidden;width:100%;box-sizing:border-box}
.qa-panel.open{display:flex}
@keyframes qaPanelIn{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}
.qa-panel.open{animation:qaPanelIn .2s ease both}
.qa-panel-header{background:#e8ecff;padding:7px 11px;font-size:12px;font-weight:700;color:var(--accent);}
.qa-panel-body{padding:8px 11px;display:flex;flex-direction:column;gap:8px}
.qa-textarea{width:100%;box-sizing:border-box;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:15px;color:#1a1a2e;background:#fafafa;resize:none;height:72px;font-family:inherit;outline:none}
.qa-textarea:focus{border-color:var(--accent)}
.qa-save-btn{width:100%;background:#2e7d32;color:white;border:none;border-radius:9px;padding:15px 10px;font-size:16px;font-weight:700;cursor:pointer;line-height:1.2}
.qa-photo-label{font-size:11px;font-weight:700;color:#555;margin:0}
.qa-thumb-row{display:flex;gap:6px;flex-wrap:wrap}
.qa-thumb{width:48px;height:48px;background:#ddd;border-radius:7px;overflow:hidden;flex-shrink:0}
.qa-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.qa-photo-btns{display:flex;gap:7px}
.qa-photo-btn{flex:1;background:#f0f4ff;border:1.5px solid var(--accent);border-radius:9px;padding:10px 4px 8px;font-size:26px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:0}
.qa-photo-btn span{font-size:11px;font-weight:700;color:var(--accent)}
/* ── FOTOS ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.foto-thumb{position:relative;aspect-ratio:1;background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:white;border:none;width:22px;height:22px;border-radius:11px;font-size:12px;cursor:pointer;z-index:2}
.foto-thumb.fallback::before{content:'🖼️';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text2)}
/* ── LIGHTBOX (Vollbild-Vorschau) ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);touch-action:none;overflow:hidden;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-select:none;pointer-events:none;transform-origin:center center;will-change:transform;transition:none;}
.lightbox .lb-close{position:absolute;top:calc(env(safe-area-inset-top,0) + 10px);right:12px;background:rgba(0,0,0,.7);color:#fff;border:2px solid rgba(255,255,255,.35);width:44px;height:44px;border-radius:50%;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.lightbox .lb-open{position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 14px);right:12px;background:rgba(255,255,255,.92);color:#000;border:none;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;z-index:2;}
.lightbox .lb-caption{position:absolute;top:calc(env(safe-area-inset-top,0) + 14px);left:14px;color:#fff;font-size:13px;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.45);padding:6px 10px;border-radius:6px;}
/* ── Foto-Beschreibung im Lightbox-Fuß ── */
.lightbox .lb-textbar{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0) + 70px);background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;color:#fff;font-size:13px;z-index:10010;display:none;max-width:calc(100% - 24px);}
.lightbox .lb-textbar.open{display:flex;flex-direction:column;gap:6px;}
.lightbox .lb-text-view{display:flex;align-items:center;gap:8px;}
.lightbox .lb-text-view-label{flex:1;color:#fff;white-space:pre-wrap;word-break:break-word;}
.lightbox .lb-text-view-label.empty{color:rgba(255,255,255,.55);font-style:italic;}
.lightbox .lb-text-edit-btn{background:rgba(255,255,255,.9);color:#000;border:none;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
.lightbox .lb-text-edit-form{display:none;gap:6px;align-items:stretch;}
.lightbox .lb-textbar.editing .lb-text-edit-form{display:flex;}
.lightbox .lb-textbar.editing .lb-text-view{display:none;}
.lightbox .lb-text-edit-form textarea{flex:1;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;min-height:56px;resize:vertical;}
.lightbox .lb-text-edit-form button{background:rgba(255,255,255,.9);color:#000;border:none;padding:6px 10px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.lightbox .lb-text-edit-form button.cancel{background:rgba(255,255,255,.2);color:#fff;}
/* ── 360° Pannellum Container ── */
#pannellumContainer{display:none;position:absolute;inset:0;z-index:1;}
#pannellumContainer.active{display:block;}
/* ── Zeichen-Canvas ── */
#drawCanvas{display:none;position:absolute;inset:0;cursor:crosshair;touch-action:none;z-index:20;}
#drawCanvas.active{display:block;}
/* ── Zeichen-Toolbar ── */
.lb-draw-bar{position:absolute;top:calc(env(safe-area-inset-top,0) + 56px);left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:5px;z-index:10003;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;}
.lb-draw-bar.visible{display:flex;}
.lb-draw-row{display:flex;gap:5px;align-items:center;}
.lb-draw-color{width:30px;height:30px;border:2px solid rgba(255,255,255,.5);border-radius:6px;cursor:pointer;padding:1px;background:none;}
.lb-draw-size{width:70px;accent-color:#6a8aff;}
.lb-draw-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-draw-btn.on{background:rgba(106,138,255,.7);border-color:#6a8aff;}
.lb-draw-btn.save{background:rgba(74,222,128,.25);border-color:#4ade80;color:#4ade80;width:auto;padding:0 12px;font-size:13px;}
.lb-draw-btn.discard{background:rgba(248,113,113,.2);border-color:#f87171;color:#f87171;width:auto;padding:0 10px;font-size:13px;}
/* Beschreibung unter dem Grid-Thumbnail */
.foto-thumb .cap-badge{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;line-height:1.2;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.foto-placeholder{display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2)}
.foto-upload-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;pointer-events:none;}
.foto-upload-overlay .up-icon{font-size:20px;animation:upbounce .8s infinite alternate;}
.foto-upload-overlay .up-lbl{color:#fff;font-size:9px;font-weight:600;}
@keyframes upbounce{from{transform:translateY(2px)}to{transform:translateY(-4px)}}
/* Anhänge (vom Desktop übertragen) */
.attach-row-mob{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:6px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.attach-thumb-mob{width:54px;height:54px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg2);cursor:pointer}
.attach-icon-mob{width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--bg2);border-radius:6px;flex-shrink:0}
.attach-meta-mob{flex:1;min-width:0}
.attach-name-mob{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attach-size-mob{font-size:11px;color:var(--text2);margin-top:2px}
/* ── NOTIZ VERLAUF ── */
.notiz-entry{background:var(--bg3);border-left:3px solid var(--accent);padding:10px 12px;margin-bottom:8px;border-radius:6px;font-size:15px}
.notiz-entry .ts{display:block;color:var(--text2);font-size:13px;margin-bottom:3px}
/* ── CHECKLISTE ── */
.ck-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.ck-item input[type=checkbox]{width:22px;height:22px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
.ck-item input[type=text]{flex:1;padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;outline:none;}
.ck-item input[type=text]:focus{border-color:var(--accent);}
.ck-item input[type=text].done-text{text-decoration:line-through;opacity:.5;}
.ck-item .ck-del{padding:4px 10px;font-size:13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;flex-shrink:0;}
/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:12px 20px;border-radius:10px;border:1px solid var(--border);z-index:100;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{background:#1a73e8;color:#fff;border-color:#1a73e8}
.hide{display:none!important}
</style>

<body>

<!-- ══ LOGIN-SCREEN ══ -->
<div id="loginScreen" class="screen">
  <h1>PAM Mobile</h1>
  <p>Verbindung zu Google Drive einrichten. Die App nutzt dieselbe <code>workboard.json</code> wie PAM am Desktop.</p>
  <button id="loginBtn" onclick="gdriveLogin()">🔐 Mit Google anmelden</button>
  <div class="login-status" id="loginStatus"></div>
</div>

<!-- ══ LISTE-SCREEN ══ -->
<div id="listScreen" class="screen hidden">
  <div class="hdr">
    <div class="hdr-title">PAM Mobile</div>
    <button class="hdr-btn icon theme-toggle-btn" onclick="toggleTheme()" title="Hell/Dunkel wechseln">☀️</button>
    <button class="hdr-btn icon" id="refreshBtn" onclick="refreshData()" title="Neu laden – lange drücken = PC-Stand erzwingen">🔄</button>
    <button class="hdr-btn" onclick="_openStammblattMob()" title="Stammblatt öffnen" style="font-size:12px;font-weight:700">📋</button>
    <button class="hdr-btn icon" onclick="openSettings()" title="Einstellungen">⚙️</button>
  </div>
  <div class="board-section">
    <div class="board-section-label" id="boardLabel">Board wählen</div>
    <div class="board-bar" id="boardBar"></div>
  </div>
  <div class="status-section" id="statusSection" style="display:none">
    <div class="board-bar" id="statusBar"></div>
  </div>

// ── Mob Photo Cache – IndexedDB (mob-photo-cache-v1) ─────────────────────────

const _MOB_PHOTO_DB='mob-photo-cache-v1';
const _MOB_PHOTO_STORE='photos';
function _mobPhotoDbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(_MOB_PHOTO_DB,1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(_MOB_PHOTO_STORE))db.createObjectStore(_MOB_PHOTO_STORE,{keyPath:'key'});};
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function _mobPhotoSave(key,dataUrl){
  try{
    const db=await _mobPhotoDbOpen();
    await new Promise((res,rej)=>{
      const tx=db.transaction(_MOB_PHOTO_STORE,'readwrite');
      tx.objectStore(_MOB_PHOTO_STORE).put({key,dataUrl,ts:Date.now()});
      tx.oncomplete=()=>{db.close();res();};
      tx.onerror=e=>{db.close();rej(e.target.error);};
    });
  }catch(e){console.warn('[MobPhoto] Speichern:',e);}
}
async function _mobPhotoGet(key){
  try{
    const db=await _mobPhotoDbOpen();
    return await new Promise(res=>{
      const tx=db.transaction(_MOB_PHOTO_STORE,'readonly');
      const req=tx.objectStore(_MOB_PHOTO_STORE).get(key);
      req.onsuccess=e=>{db.close();res(e.target.result?e.target.result.dataUrl:null);};
      req.onerror=()=>{db.close();res(null);};
    });
  }catch(e){return null;}
}

}

function _dataUrlToBlob(dataUrl){
  const arr=dataUrl.split(',');const mime=(arr[0].match(/:(.*?);/)||['','image/jpeg'])[1];
  const bstr=atob(arr[1]);let n=bstr.length;const u8=new Uint8Array(n);
  while(n--)u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}

// ══ AUTH ══
// Redirect-URI normieren: index.html entfernen damit sie immer identisch ist
// egal ob Nutzer die App mit oder ohne index.html aufgerufen hat
function _getRedirectUri(){
  return window.location.origin+window.location.pathname.replace(/index\.html$/i,'');
}
function gdriveLogin(){
  _mobSilentGaveUp=false;
  const hint=localStorage.getItem('mob_user_email_v1')||localStorage.getItem('ptp_user_email_v1')||'';
  const params=new URLSearchParams({
    client_id:GDRIVE_CLIENT_ID,
    redirect_uri:_getRedirectUri(),
    response_type:'code',
    access_type:'offline',
    prompt:'consent',
    scope:GDRIVE_SCOPE,
    include_granted_scopes:'true',
  });
  if(hint)params.set('login_hint',hint);
  // Redirect-Flow funktioniert in Browser und PWA-Modus (iOS/Android)
  // Im PWA-Modus: Token landet in localStorage via DOMContentLoaded,
  // App liest ihn per visibilitychange wenn Nutzer zurückwechselt
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params;
}
function initTokenClient(){
  if(gdriveTokenClient)return;
  if(!window.google||!window.google.accounts||!window.google.accounts.oauth2)return;
  gdriveTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GDRIVE_CLIENT_ID,
    scope:GDRIVE_SCOPE,
    callback:onTokenResponse,
    error_callback:(err)=>{
      console.warn('[PTP-Mobile] GIS error_callback:',JSON.stringify(err));
      if(err&&(err.type==='popup_failed_to_open'||err.type==='popup_closed'||err.type==='immediate_failed')){
        if(err.type==='immediate_failed') _mobSilentGaveUp=true;
        document.getElementById('loginStatus').textContent='⚠ Popup blockiert – bitte Popup im Browser erlauben und erneut versuchen.';
      } else if(err&&err.type){
        document.getElementById('loginStatus').textContent='⚠ Google-Fehler: '+err.type;
      }
    }
  });
}

function onGsiLoaded(){
  console.log('[PTP-Mobile] GSI geladen – initialisiere Token-Client');
  initTokenClient();
  // Falls Auto-Connect bereits auf Token wartet, jetzt fortfahren
  if(typeof _pendingAutoConnect==='function'){
    _pendingAutoConnect();
    _pendingAutoConnect=null;
  }
}
let _pendingAutoConnect=null;
let _mobSilentGaveUp=false; // Nach immediate_failed: kein weiterer Auto-Versuch
function onTokenResponse(resp){
  if(resp.error){
    const _mobErrEl=document.getElementById('loginStatus');
    if(['immediate_failed','interaction_required'].includes(resp.error)){
      // Silent-Refresh fehlgeschlagen (Third-Party-Cookie-Blocking)
      // → Banner zeigen, User muss explizit klicken
      if(_mobErrEl)_mobErrEl.textContent='⚠ Automatische Anmeldung nicht möglich – bitte "Anmelden" tippen.';
      _showMobDriveWarnBanner();
      console.warn('[PTP-Mobile] immediate_failed / interaction_required – Nutzer-Interaktion nötig');
    } else if(resp.error==='access_denied'){
      if(_mobErrEl)_mobErrEl.textContent='⚠ Zugriff verweigert – bitte erneut anmelden.';
    } else {
      if(_mobErrEl)_mobErrEl.textContent='⚠ Anmeldefehler: '+resp.error;
    }
    return;
  }
  gdriveToken=resp.access_token;
  gdriveTokenExpires=Date.now()+(Number(resp.expires_in||3600)-60)*1000;
  try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){console.warn('[PTP-Mobile] Token speichern:',e);}
  _scheduleGdriveRefresh(Number(resp.expires_in||3600));
  afterLogin();
}
async function afterLogin(){
  _mobSilentGaveUp=false; // Erfolgreicher Login
  // Versuche User-Info zu holen
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+gdriveToken}});
    if(r.ok){
      const j=await r.json();
      userEmail=j.email||'';
      // E-Mail für login_hint speichern (kein Konto-Dialog beim nächsten Besuch)
      if(userEmail&&!localStorage.getItem('mob_user_email_v1')){
        try{localStorage.setItem('mob_user_email_v1',userEmail);}catch(e){}
      }
    }
  }catch(e){console.warn('[PTP-Mobile]',e);}
  // Workspace-Ordner-ID aus localStorage laden (gleicher Key wie PC-Version)
  try{workspaceFolderId=localStorage.getItem(WORKSPACE_FOLDER_KEY)||null;}catch(e){console.warn('[PTP-Mobile]',e);}
  // HV-Bild-Cache vorladen (schnellere Thumbnails)

}

// ── Resumable Upload: Two-Step-Verfahren (Session-Init + Byte-Transfer) ──
// Robuster bei instabilen Netzwerkverbindungen. Geeignet für alle Dateigrössen.
// token       – gültiger Access-Token
// fileId      – Drive-Datei-ID für Update (PATCH); null für neue Datei (POST)
// content     – String oder Uint8Array / ArrayBuffer
// mimeType    – MIME-Typ der Datei
// etag        – optionaler ETag für Optimistic Locking (If-Match)
// Rückgabe: Response-Objekt des Upload-Requests
async function _driveResumableUpdate(token, fileId, content, mimeType, etag) {
  mimeType = mimeType || 'application/json';
  const encoded = (typeof content === 'string')
    ? new TextEncoder().encode(content)
    : (content instanceof ArrayBuffer ? new Uint8Array(content) : content);
  const size = encoded.byteLength !== undefined ? encoded.byteLength : encoded.length;

  // Step 1: Upload-Session initialisieren
  const initUrl = fileId
    ? 'https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=resumable&fields=modifiedTime'
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&fields=id,name,modifiedTime';
  const initHeaders = {
    Authorization: 'Bearer ' + token,
    'Content-Type': 'application/json',
    'X-Upload-Content-Type': mimeType,
    'X-Upload-Content-Length': String(size)
  };
  if (etag) initHeaders['If-Match'] = etag;

  const initR = await fetch(initUrl, {
    method: fileId ? 'PATCH' : 'POST',
    headers: initHeaders,
    body: JSON.stringify({ mimeType })
  });
  if (initR.status === 412) return initR; // 412 direkt zurückgeben → ETag-Konflikt-Dialog
  if (!initR.ok) throw new Error('Resumable-Init fehlgeschlagen: HTTP ' + initR.status);

  const sessionUrl = initR.headers.get('Location');
  if (!sessionUrl) throw new Error('Keine Resumable-Session-URL erhalten');

  // Step 2: Daten übertragen
  const uploadR = await fetch(sessionUrl, {
    method: 'PUT',
    headers: {
      'Content-Type': mimeType,
      'Content-Length': String(size)
    },
    body: encoded
  });
  return uploadR;
}

// Öffnet Google-OAuth in neuem Tab (Safari-kompatibler Redirect-Flow)
// Da durch User-Geste ausgelöst, ist window.open in Safari erlaubt.
function _openOAuthNewTab(){
  const hint=localStorage.getItem('mob_user_email_v1')||localStorage.getItem('ptp_user_email_v1')||'';
  const params=new URLSearchParams({
    client_id:GDRIVE_CLIENT_ID,
    redirect_uri:_getRedirectUri(),
    response_type:'token',
    scope:GDRIVE_SCOPE,
    include_granted_scopes:'true',
  });
  if(hint)params.set('login_hint',hint);
  const authUrl='https://accounts.google.com/o/oauth2/v2/auth?'+params;
  const w=window.open(authUrl,'_blank');
  if(w){
    toast('Bitte im neuen Tab anmelden und danach zurückwechseln','info');
  }else{
    // Neuer Tab wurde blockiert → direkter Seitenaufruf
    window.location.href=authUrl;
  }
}
function _mobDriveRenew(){
  _hideMobDriveWarnBanner();
  initTokenClient();
  if(!gdriveTokenClient){
    // GIS nicht geladen → direkt neuer Tab (Safari-Fallback)
    _openOAuthNewTab();
    return;
  }
  let _done=false;
  const _fallback=setTimeout(()=>{if(!_done){_done=true;_openOAuthNewTab();}},6000);
  const prev=gdriveTokenClient.callback;
  gdriveTokenClient.callback=(r)=>{
    if(_done)return;_done=true;clearTimeout(_fallback);
    gdriveTokenClient.callback=prev;
    if(r&&r.access_token){
      gdriveToken=r.access_token;
      gdriveTokenExpires=Date.now()+(Number(r.expires_in||3600)-60)*1000;
      try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){}
      _scheduleGdriveRefresh(Number(r.expires_in||3600));
      toast('✓ Drive-Verbindung erneuert','success');
    }else{
      // GIS fehlgeschlagen (z.B. Safari ITP) → Fallback: neuer Tab
      _openOAuthNewTab();
      _showMobDriveWarnBanner();
    }
  };
  try{gdriveTokenClient.requestAccessToken({});}catch(e){if(!_done){_done=true;clearTimeout(_fallback);_openOAuthNewTab();}}
}
function _scheduleGdriveRefresh(expiresIn){
  clearTimeout(_gdriveRefreshTimer);
  // 10 Minuten vor Ablauf warnen (statt 5 Min), damit Nutzer Zeit hat zu reagieren
  const delay=Math.max(10000,(expiresIn-600)*1000); // Fix: Einheiten korrekt – zuerst *1000 (s→ms), dann Minimum
  _gdriveRefreshTimer=setTimeout(()=>{
    // Cloud-Refresh versuchen – kein Nutzereingriff nötig
    _renewTokenViaCloud().then(ok=>{
      if(!ok){
        _showMobDriveWarnBanner();
        toast('⚠ Drive-Verbindung läuft ab – bitte oben erneuern','error');
      }
    });
  },delay);
}
function silentRefresh(){
  return new Promise(resolve=>{
    initTokenClient();
    if(!gdriveTokenClient){resolve(false);return;}
    let _done=false;
    // Timeout: Safari blockiert GIS-Hidden-Iframe (ITP) → Callback feuert nie → würde ewig hängen
    const _t=setTimeout(()=>{if(!_done){_done=true;console.warn('[PTP-Mobile] silentRefresh Timeout (Safari ITP?)');resolve(false);}},5000);
    const prev=gdriveTokenClient.callback;
    gdriveTokenClient.callback=(resp)=>{
      if(_done)return;_done=true;clearTimeout(_t);
      gdriveTokenClient.callback=prev;
      if(resp&&resp.access_token){
        gdriveToken=resp.access_token;
        gdriveTokenExpires=Date.now()+(Number(resp.expires_in||3600)-60)*1000;
        try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){console.warn('[PTP-Mobile] Token speichern in silentRefresh:',e);}
        _scheduleGdriveRefresh(Number(resp.expires_in||3600));
        resolve(true);
      }else resolve(false);
    };
    try{gdriveTokenClient.requestAccessToken({prompt:'none'});}catch(e){console.warn('[PTP-Mobile]',e);if(!_done){_done=true;clearTimeout(_t);resolve(false);}}
  });
}
async function ensureToken(){
  if(tokenValid())return true;
  const ok=await silentRefresh();
  if(!ok){showLogin('Bitte erneut anmelden');return false;}
  return true;
}
function forceAppUpdate(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      Promise.all(regs.map(r=>r.unregister())).then(()=>{
        caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{
          toast('Cache geleert – App wird neu geladen…','success');
          setTimeout(()=>location.reload(true),800);
        });
      });
    });
  } else {
    location.reload(true);
  }
}

function renderHeuteMobil(){
  var el=document.getElementById('heuteList');if(!el)return;

  var in3=new Date(Date.now()+3*864e5).toISOString().split('T')[0];
  var ueberfaellig=[],heuteFaellig=[],bald=[];
  // Bereits hinzugefügte Task-IDs verhindern Doppeleinträge (due + ausfuehrungstermin)
  var _addedIds=new Set();
  function _pushItem(t,bName,date){
    var key=t.id+'|'+(date==='due'?'due':'ausf');
    if(_addedIds.has(key))return;
    _addedIds.add(key);
    var d=(date==='due')?t.due:t.ausfuehrungstermin;
    var item={t:t,board:bName,dateType:date,dateVal:d};

      if(t.ausfuehrungstermin)_pushItem(t,bName,'ausf');
    });

  ueberfaellig.sort(function(a,b){return a.t.due<b.t.due?-1:1;});

// ── TOKEN-KEY MIGRATION (von altem ptpm_token auf ptp_gdrive_token_v1) ──
function migrateTokenKey(){
  try{
    const legacyToken=localStorage.getItem(LEGACY_TOKEN_KEY);
    if(legacyToken){
      // Token im alten Key vorhanden
      const current=localStorage.getItem(TOKEN_KEY);
      if(!current){
        // Neuer Key ist leer → migriere
        localStorage.setItem(TOKEN_KEY,legacyToken);
        // Alten Key löschen
        localStorage.removeItem(LEGACY_TOKEN_KEY);
        console.log('[PTP-Mobile] Token-Key migriert von '+LEGACY_TOKEN_KEY+' zu '+TOKEN_KEY);
      }
    }
  }catch(e){console.warn('[PTP-Mobile] Token-Migration:',e);}
}

async function _searchWorkboardInDrive(){
  let q="name='workboard.json' and mimeType='application/json' and trashed=false";
  // Zuerst im Workspace-Ordner suchen (mit Fallback auf Drive-Root)
  if(workspaceFolderId){
    q+=" and '"+workspaceFolderId+"' in parents";
  }
  const r=await fetch("https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(q)+"&fields=files(id%2Cname%2CmodifiedTime)&orderBy=modifiedTime%20desc",
    {headers:{Authorization:'Bearer '+gdriveToken}});
  if(!r.ok)return null;
  const data=await r.json();
  let files=data.files||[];
  // Fallback: Datei noch im Drive-Root (vor Migration)
  if(files.length===0&&workspaceFolderId){
    const r2=await fetch("https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent("name='workboard.json' and mimeType='application/json' and trashed=false")+"&fields=files(id%2Cname%2CmodifiedTime)&orderBy=modifiedTime%20desc",
      {headers:{Authorization:'Bearer '+gdriveToken}});
    if(r2.ok){const d2=await r2.json();files=d2.files||[];}
  }
  return files.length>0?files[0]:null;
}
async function _reconnectToNewFile(){
  // Neue workboard.json finden (z.B. vom Desktop neu erstellt)
  try{
    const found=await _searchWorkboardInDrive();

      try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){console.warn('[PTP-Mobile]',e);}

}

    const found=await _searchWorkboardInDrive();
    if(!found){document.getElementById('loginStatus').textContent='Keine workboard.json gefunden — erst in PAM am Desktop anlegen.';return;}
    fileId=found.id;fileName=found.name||'workboard.json';
    try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){console.warn('[PTP-Mobile]',e);}
    const ok=await loadFile();
    if(ok){showList();renderList();}
  }catch(e){document.getElementById('loginStatus').textContent='Drive-Fehler: '+e.message;}
}
// Splittet rohe Drive-Daten in statuses / sichtbare boards / hiddenBoards / Whitelist
let _remoteBoardStatuses={}; // wird vom Desktop gesetzt, Mobil schreibt es unverändert zurück
let boardTypes={}; // 'baustelle' | 'notiz' pro Board-Name
function _applyMobileFilter(data){
  statuses=Array.isArray(data._statuses)?data._statuses:[];
  mobileWhitelist=Array.isArray(data._mobileBoards)?data._mobileBoards.slice():[];
  _remoteBoardStatuses=(data._boardStatuses&&typeof data._boardStatuses==='object')?{...data._boardStatuses}:{};
  boardTypes=(data._boardTypes&&typeof data._boardTypes==='object'&&Object.keys(data._boardTypes).length)?{...data._boardTypes}:{};
  // ── AUTO-MIGRATION: fehlende boardTypes aus Boardname ergänzen ──
  {const _np=/aufgab|notiz|todo|to[\s_-]do/i;
  let _m=0;
  for(const k of Object.keys(data)){
    if(k.startsWith('_')||!Array.isArray(data[k]))continue;
    if(!boardTypes[k]){boardTypes[k]=_np.test(k)?'notiz':'baustelle';_m++;}
  }
  if(_m)console.info('[PTPm] boardTypes ergänzt ('+_m+' Boards):',boardTypes);}
  boards={};hiddenBoards={};
  const hasWhitelist=mobileWhitelist.length>0;
  for(const[k,v]of Object.entries(data)){
    if(k.startsWith('_'))continue;
    if(!Array.isArray(v))continue;
    // Whitelist aktiv → nur enthaltene Boards anzeigen, Rest in hiddenBoards (Desktop-Quelle der Wahrheit)
    if(hasWhitelist&&!mobileWhitelist.includes(k)){
      hiddenBoards[k]=v; // PC hat "nicht mobil anzeigen" → verstecken, aber Daten erhalten
    } else {
      boards[k]=v;
    }
  }
}
// ── POLLING: fremde Änderungen (z.B. vom Desktop) übernehmen ──
let fileLastModified=null;
async function loadFile(){
  if(!fileId)return false;
  if(!(await ensureToken()))return false;
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    // ETag für Optimistic Locking speichern
    const _mLoadETag=r.headers.get('ETag')||r.headers.get('etag');
    if(_mLoadETag)mobETag=_mLoadETag;
    const data=await r.json();
    _applyMobileFilter(data);
    const bk=Object.keys(boards);
    if(!currentBoard||!boards[currentBoard])currentBoard=bk[0]||'';
    // modifiedTime und parent-Ordner-ID für Poll-Vergleich aktualisieren
    try{
      const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime,parents&_='+Date.now(),
        {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
      if(mr.ok){
        const meta=await mr.json();
        fileLastModified=meta.modifiedTime||fileLastModified;
        // Workspace-Ordner-ID aus parent extrahieren (falls vorhanden) und speichern
        if(meta.parents&&meta.parents.length>0&&!meta.parents.includes('root')){
          workspaceFolderId=meta.parents[0];
          try{localStorage.setItem(WORKSPACE_FOLDER_KEY,workspaceFolderId);}catch(e){console.warn('[PTP-Mobile]',e);}
        }
      }
    }catch(e){console.warn('[PTP-Mobile]',e);}
    startPolling();
    return true;
  }catch(e){toast('Laden fehlgeschlagen: '+e.message,'error');return false;}
}
let pollTimer=null;
let _saveRetryCount=0;
async function pollForChanges(){
  if(!fileId||!gdriveToken)return;
  // Nicht während der User tippt
  const ae=document.activeElement;
  if(ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName))return;
  // Nicht während lokale Änderungen auf Speicherung warten — aber max. 60s blockieren
  // (verhindert dauerhaften Poll-Stopp wenn Speichern wiederholt scheitert)
  if(dirty&&(Date.now()-_dirtyTs)<60000)return;
  try{
    if(!(await ensureToken()))return;
    const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
    if(!mr.ok){
      // 404 = Datei gelöscht (z.B. Neustart vom Desktop) → neue suchen
      if(mr.status===404)await _reconnectToNewFile();
      return;
    }
    const meta=await mr.json();
    if(!fileLastModified){fileLastModified=meta.modifiedTime;return;}
    if(meta.modifiedTime===fileLastModified)return;
    // Datei auf Drive ist neuer — neu laden
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
    if(!r.ok)return;
    const data=await r.json();
    _applyMobileFilter(data);
    if(currentBoard && !boards[currentBoard]){const bk=Object.keys(boards);currentBoard=bk[0]||'';}
    currentStatus=''; // Filter zurücksetzen damit alle Änderungen sichtbar sind
    fileLastModified=meta.modifiedTime;
    if(currentTaskId){const t=findTaskById(currentTaskId);if(t)renderDetail(t);else closeDetail();}
    else{renderList();if(_mobView==='heute')renderHeuteMobil();}
    toast('↻ Vom Desktop aktualisiert','success');
  }catch(e){console.warn('[PTP-Mobile]',e);}
}
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(pollForChanges,30000); // Synchron mit Desktop (war 20000)
  if(!window._ptpmVisHooked){
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState!=='visible')return;
      // Token-Check: wenn er in <10 Min abläuft, stille Erneuerung versuchen
      // Wichtig auf Mobile: setTimeout schläft im Hintergrund-Tab ein – dieser
      // Handler ist das Sicherheitsnetz wenn der Timer nicht feuern konnte.
      if(gdriveToken&&gdriveTokenExpires){
        const msLeft=gdriveTokenExpires-Date.now();
        if(msLeft>0&&msLeft<600000){
          silentRefresh().then(ok=>{
            if(ok)_hideMobDriveWarnBanner();
            else _showMobDriveWarnBanner();
          });
        }
      }
      pollForChanges();
    });
    window._ptpmVisHooked=true;
  }
}
// Merge-Helper: Listen per Schlüssel unionen (Remote zuerst, lokale neue hinten)
function _mergeListByKey(remoteList,localList,keyFn){
  const a=Array.isArray(remoteList)?remoteList:[];
  const b=Array.isArray(localList)?localList:[];
  const out=[];const seen=new Set();
  for(const it of a){const k=keyFn(it||{});if(k&&!seen.has(k)){seen.add(k);out.push(it);}else if(!k){out.push(it);}}
  for(const it of b){const k=keyFn(it||{});if(k&&!seen.has(k)){seen.add(k);out.push(it);}else if(!k){out.push(it);}}
  return out;
}
async function saveFile(){
  if(!fileId||!gdriveToken)return;
  if(!(await ensureToken()))return;
  setSaveInd('saving','Speichere…');
  // Snapshot der aktuell offenen Task-ID – currentTaskId kann während des asynchronen
  // Saves durch closeDetail() auf null gesetzt werden; wir brauchen den ursprünglichen
  // Wert, damit der Konflikt-Handler die lokale Task findet und nicht verwirft.
  const _savingTaskId=currentTaskId;
  try{
    // ── Konflikt-Check: hat der Desktop seit unserem letzten Stand geschrieben? ──
    try{
      const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime&_='+Date.now(),
        {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
      if(mr.ok){
        const meta=await mr.json();
        if(fileLastModified&&meta.modifiedTime&&meta.modifiedTime!==fileLastModified){
          // Remote ist neuer → laden, dann nur die aktuell offene Task übernehmen
          const fr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
            {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
          if(fr.ok){
            const remote=await fr.json();
            const remoteStatuses=Array.isArray(remote._statuses)?remote._statuses:statuses;
            // Remote-Whitelist auslesen — überschreibt lokale (Desktop ist Quelle der Wahrheit)
            const rWhite=Array.isArray(remote._mobileBoards)?remote._mobileBoards.slice():[];
            const rHasWhitelist=rWhite.length>0;
            // Sichtbare + versteckte Boards aus Remote aufteilen
            const remoteVisible={},remoteHidden={};
            for(const[k,v]of Object.entries(remote)){
              if(k.startsWith('_'))continue;
              if(!Array.isArray(v))continue;
              if(rHasWhitelist && !rWhite.includes(k))remoteHidden[k]=v;
              else remoteVisible[k]=v;
            }
            // Lokale Änderung der gerade offenen Task in die sichtbaren Remote-Boards mergen
            if(_savingTaskId){
              const localTask=findTaskById(_savingTaskId);
              if(localTask){
                let placed=false;
                for(const bn of Object.keys(remoteVisible)){
                  const idx=remoteVisible[bn].findIndex(t=>t&&t.id===_savingTaskId);
                  if(idx>=0){
                    const rt=remoteVisible[bn][idx];
                    // Scalars: localTask gewinnt – ABER nicht wenn localTask leer ist und Remote etwas hat
                    const mergedTask={...rt,...localTask};
                    const scalarFields=['ausführungsdatum','due','title','desc','adresse','hausverwaltung','schadensbild','owner','status','ampel','source','gdrive','nas','tags','aktivitaet','ausfuehrungstermin']; // Fix: tags, aktivitaet, ausfuehrungstermin ergänzt
                    for(const f of scalarFields){
                      const lv=localTask[f];const rv=rt[f];
                      if((lv===''||lv===null||lv===undefined)&&rv){mergedTask[f]=rv;}
                    }
                    // PC-exklusive Felder: Remote gewinnt immer (Mobile überschreibt sie nie)
                    // COMPAT-FIX: 'anfrageEingangDatum' ergänzt – Desktop-Only-Feld, das Mobile
                    // nie bearbeitet und das bei einem Konflikt-Merge sonst überschrieben würde.
                    const _pcOnly=['emailPdfs','emailOriginals','gmailLinks','links','repNr','kundenNr','auftragswert','gdriveOrdner','emailOrdner','sbPdfOrdner','ortstermin','aufgaben','anfrageEingangDatum','freieTermine','msMessageId','msConversationId','msThreadMessages']; // Fix: bauOrdner→sbPdfOrdner; aufgaben, anfrageEingangDatum hinzugefügt (PC-only)
                    for(const f of _pcOnly){if(rt[f]!==undefined)mergedTask[f]=rt[f];}
                    // Prüfberichte: echter Merge PC + Mobile (nicht PC-only)
                    // → auf Mobile erstellte Berichte bleiben erhalten, PC-Berichte kommen hinzu
                    mergedTask.pruefberichte=_mergeListByKey(rt.pruefberichte,localTask.pruefberichte,b=>(b.id||((b.titel||'')+'|'+(b.datum||''))));
                    mergedTask.notizVerlauf=_mergeListByKey(rt.notizVerlauf,localTask.notizVerlauf,n=>((n.ts||'')+'|'+(n.text||'')));
                    mergedTask.zeitEntries=_mergeListByKey(rt.zeitEntries,localTask.zeitEntries,e=>((e.date||'')+'|'+(e.von||'')+'|'+(e.bis||'')+'|'+(e.beschreibung||'')));
                    mergedTask.ausserhausTermine=_mergeListByKey(rt.ausserhausTermine,localTask.ausserhausTermine,e=>((e.date||'')+'|'+(e.von||'')+'|'+(e.bis||'')+'|'+(e.beschreibung||'')));
                    mergedTask.fotos=_mergeListByKey(rt.fotos,localTask.fotos,f=>(f.id||f.driveId||f.path||f.name||''));
                    mergedTask.attachments=_mergeListByKey(rt.attachments,localTask.attachments,f=>((f.name||'')+'|'+(f.size||0)));
                    mergedTask.timeEntries=_mergeListByKey(rt.timeEntries,localTask.timeEntries,e=>String(e.start||''));
                    // Fix: checkliste und kontakte mergen statt überschreiben
                    mergedTask.checkliste=_mergeListByKey(rt.checkliste,localTask.checkliste,c=>((c.text||'')+'|'+(c.done?'1':'0')));
                    mergedTask.kontakte=_mergeListByKey(rt.kontakte,localTask.kontakte,k=>((k.rolle||'')+'|'+(k.name||'')+'|'+(k.tel||'')));
                    remoteVisible[bn][idx]=mergedTask;
                    placed=true;break;
                  }
                }
                if(!placed){
                  const target=currentBoard&&remoteVisible[currentBoard]?currentBoard:Object.keys(remoteVisible)[0];
                  if(target){if(!remoteVisible[target])remoteVisible[target]=[];remoteVisible[target].push(localTask);}
                }
              }
            }
            statuses=remoteStatuses;
            mobileWhitelist=rWhite;
            hiddenBoards=remoteHidden;
            // Kein Task offen (_savingTaskId null):
            // Remote als Basis nehmen (PC-Änderungen an bestehenden Tasks erhalten).
            // Nur lokal neue Tasks (noch nicht in Remote) hinzufügen.
            // Lokal gelöschte Tasks (nicht mehr in local, aber in Remote) NICHT zurückbringen.
            if(!_savingTaskId){
              // Alle lokal noch vorhandenen IDs über alle Boards sammeln (Löschungen fehlen hier)
              const _allLocalIds=new Set();
              for(const arr of Object.values(boards||{})){
                for(const t of (arr||[])){if(t&&t.id)_allLocalIds.add(t.id);}
              }
              // Alle lokal bekannten IDs (inkl. gelöschter) aus dem letzten geladenen Remote-Stand
              // können wir nicht direkt kennen – daher: Remote als Basis, lokal-neue hinzu
              const merged={};
              for(const bn of Object.keys(remoteVisible)){
                const localArr=boards[bn]||[];
                const remoteArr=remoteVisible[bn]||[];
                const remoteIds=new Set(remoteArr.map(t=>t&&t.id).filter(Boolean));
                // Remote-Tasks als Basis (PC-Änderungen bleiben erhalten)
                const mergedArr=[...remoteArr];
                // Lokal neue Tasks hinzufügen (nur IDs die Remote noch nicht kennt)
                for(const lt of localArr){
                  if(!lt||!lt.id)continue;
                  if(!remoteIds.has(lt.id))mergedArr.push(lt); // neu auf Mobile, noch nicht auf PC
                }
                merged[bn]=mergedArr;
              }
              // Boards die nur lokal existieren (auf Mobile neu angelegt, noch nicht in Remote)
              for(const bn of Object.keys(boards||{})){
                if(!merged[bn])merged[bn]=(boards[bn]||[]).slice();
              }
              boards=merged;
            } else {
              boards=remoteVisible;
            }
            if(remote._boardStatuses&&typeof remote._boardStatuses==='object')
              _remoteBoardStatuses={...remote._boardStatuses};
            // Board-Typen (Baustelle/Aufgaben) aus Remote übernehmen, damit nach PC-Konflikt-Merge korrekt
            if(remote._boardTypes&&typeof remote._boardTypes==='object'&&Object.keys(remote._boardTypes).length)
              boardTypes={...remote._boardTypes};
          }
        }
      }
    }catch(e){console.warn('[PTP-Mobile] Konflikt-Check:',e);}
    // Save-Objekt: Whitelist + Desktop-Spalten (_boardStatuses) + _boardTypes erhalten, versteckte Boards durchreichen
    const obj={_statuses:statuses};
    if(Object.keys(_remoteBoardStatuses||{}).length)obj._boardStatuses={..._remoteBoardStatuses};
    if(Object.keys(boardTypes||{}).length)obj._boardTypes={...boardTypes}; // Board-Typen (baustelle/notiz) nicht verlieren
    if(Array.isArray(mobileWhitelist)&&mobileWhitelist.length)obj._mobileBoards=mobileWhitelist.slice();
    for(const[k,v]of Object.entries(hiddenBoards||{}))obj[k]=v;
    for(const[k,v]of Object.entries(boards||{}))obj[k]=v;
    // _mobSaveReplacer: entfernt localUrl (data:/blob:) und _uploading aus Foto-Objekten
    // → hält die Drive-JSON klein; Fotos bleiben über IndexedDB (localKey) erhalten
    const content=JSON.stringify(obj,_mobSaveReplacer,2);
    // Resumable Upload (Two-Step: Session-Init + Byte-Transfer)
    const r=await _driveResumableUpdate(gdriveToken, fileId, content, 'application/json', mobETag);
    if(r.status===412){
      _showETagConflictDialog(
        async()=>{mobETag=null;await saveWorkboard(fileId,content);},
        async()=>{await loadWorkboard(fileId);}
      );
      return {ok:false,status:412};
    }
    const _mobSaveETag=r.headers.get('ETag')||r.headers.get('etag');
    if(_mobSaveETag)mobETag=_mobSaveETag;
    // 401 → Token still erneuern und einmal sofort Retry
    if(r.status===401){
      setSaveInd('saving','Token erneuern…');
      const ok=await silentRefresh();
      if(ok){
        // Einmaliger direkter Retry nach Token-Erneuerung
        const r2=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fileId+'?uploadType=media&fields=modifiedTime',
          {method:'PATCH',headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'application/json'},body:content});
        if(!r2.ok)throw new Error('HTTP '+r2.status+' (nach Token-Refresh)');
        try{const rm2=await r2.json();if(rm2&&rm2.modifiedTime)fileLastModified=rm2.modifiedTime;}catch(e){}
      } else {
        showLogin('Bitte erneut anmelden');
        dirty=false;
        return;
      }
    } else if(!r.ok){
      throw new Error('HTTP '+r.status);
    } else {
      try{const rm=await r.json();if(rm&&rm.modifiedTime)fileLastModified=rm.modifiedTime;}catch(e){console.warn('[PTP-Mobile]',e);}
    }
    _saveMobileBackup(); // Lokales Backup nach erfolgreichem Speichern
    setSaveInd('saved','✓ Gespeichert');
    dirty=false;
    _saveRetryCount=0;
    // Board-Bar und Liste aktualisieren falls Konflikt-Check neue Daten vom Desktop geladen hat
    // (Nicht renderDetail – das würde Fokus/Felder zurücksetzen während der Nutzer tippt)
    try{renderBoardBar();}catch(e){}
    if(!currentTaskId){try{renderList();}catch(e){}}
  }catch(e){
    _saveMobileBackup(); // Lokal sichern wenn Drive nicht erreichbar
    _saveRetryCount=(_saveRetryCount||0)+1;
    if(_saveRetryCount<=3){
      setSaveInd('error','✗ Fehler – Retry '+_saveRetryCount+'/3…');
      const delay=1500*_saveRetryCount;
      clearTimeout(saveTimer);
      saveTimer=setTimeout(()=>{saveFile();},delay);
    } else {
      // Max Retries überschritten: dirty zurücksetzen damit Polling wieder läuft
      // Backup wurde gesichert – Remote-Stand laden um wieder konsistent zu sein
      setSaveInd('error','✗ Sync fehlgeschlagen – lade Remote-Stand');
      dirty=false;
      _saveRetryCount=0;
      setTimeout(async()=>{
        try{await loadFile();renderList();toast('⚠ Offline-Backup gesichert. Remote-Stand geladen.','error',5000);}
        catch(ex){console.warn('[PTP-Mobile] Fallback-Load:',ex);}
      },1000);
    }
  }
}

/* PDF aus Prüfbericht generieren */
async function _generatePruefPdf(bericht,task){
  if(!window.jspdf){toast('PDF-Bibliothek lädt noch…','error');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=14;
    let y=M;
    const farbe=[26,92,58]; // #1a5c3a

    /* Kopfzeile */
    doc.setFillColor(...farbe);
    doc.rect(0,0,W,28,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text(bericht.titel,M,12);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    const taskName=(task.title||task.name||'Objektadresse');
    const addr=task.adresse||'';
    doc.text(taskName+(addr?' · '+addr:''),M,19);
    doc.text('Datum: '+bericht.datum,M,25);
    y=36;

    /* Statistik */
    let ok=0,mangel=0,offen=0;
    bericht.sektionen.forEach(s=>s.items.forEach(it=>{
      if(it.status==='ok')ok++;else if(it.status==='mangel')mangel++;else offen++;
    }));
    const total=ok+mangel+offen;
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
    doc.text('Ergebnis: '+ok+' von '+total+' OK'+( mangel?' · '+mangel+' Mängel':'')+(offen?' · '+offen+' offen':''),M,y);
    y+=8;

    /* Sektionen */
    bericht.sektionen.forEach(sek=>{
      if(y>265){doc.addPage();y=M;}
      doc.setFillColor(240,240,240);
      doc.rect(M,y,W-2*M,7,'F');
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(60,60,60);
      doc.text(sek.titel,M+2,y+5);
      y+=9;

      const tableData=sek.items.map(it=>{
        const s=it.status==='ok'?'OK':it.status==='mangel'?'MANGEL':'OFFEN';
        return[s,it.text,it.notiz||''];
      });
      doc.autoTable({
        startY:y,
        head:[['Status','Prüfpunkt','Notiz']],
        body:tableData,
        theme:'grid',
        margin:{left:M,right:M},
        headStyles:{fillColor:farbe,fontSize:8,fontStyle:'bold'},
        bodyStyles:{fontSize:8,minCellHeight:7},
        columnStyles:{0:{cellWidth:20,fontStyle:'bold'},1:{cellWidth:110},2:{cellWidth:52}},
        didParseCell:(data)=>{
          if(data.section==='body'&&data.column.index===0){
            if(data.cell.raw==='OK'){data.cell.styles.textColor=[26,122,60];}
            else if(data.cell.raw==='MANGEL'){data.cell.styles.textColor=[192,57,43];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[130,130,130];}
          }
        }
      });
      y=doc.lastAutoTable.finalY+5;
    });

    /* Bemerkungen */
    if(bericht.bemerkung){
      if(y>255){doc.addPage();y=M;}
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
      doc.text('Bemerkungen:',M,y);y+=5;
      doc.setFont('helvetica','normal');
      const lines=doc.splitTextToSize(bericht.bemerkung,W-2*M);
      doc.text(lines,M,y);
      y+=lines.length*5+4;
    }

    /* Fußzeile */
    const pages=doc.internal.getNumberOfPages();
    for(let p=1;p<=pages;p++){
      doc.setPage(p);
      doc.setFontSize(8);doc.setTextColor(150,150,150);
      doc.text('Seite '+p+' von '+pages,W/2,292,{align:'center'});
      doc.text('Erstellt: '+new Date().toLocaleString('de-DE'),M,292);
    }

    const blob=doc.output('blob');
    bericht._pdfBlob=blob;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=bericht.titel+'_'+bericht.datum+'.pdf';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    toast('✓ PDF erstellt','success');

    /* Optional: in Drive hochladen */
    if(gdriveToken&&task.gdriveOrdner){
      try{
        const folderId=task.gdriveOrdner.match(/[-\w]{25,}/)?.[0];
        if(folderId){
          const fname=bericht.titel+'_'+bericht.datum+'.pdf';
          const form=new FormData();
          form.append('metadata',new Blob([JSON.stringify({name:fname,parents:[folderId],mimeType:'application/pdf'})],{type:'application/json'}));
          form.append('file',blob);
          const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form});
          if(r.ok){const j=await r.json();bericht.driveFileId=j.id;scheduleSave();toast('✓ PDF in Drive gespeichert','success');}
        }
      }catch(ex){console.warn('Drive-Upload Pruef-PDF:',ex);}
    }
  }catch(e){console.error('Pruef-PDF Fehler:',e);toast('PDF-Fehler: '+e.message,'error');}
}

    const ti=document.createElement('input');ti.type='text';ti.value=bericht.techniker||'';ti.placeholder='Name Techniker';ti.autocomplete='off';

  const shareBtn=document.createElement('button');shareBtn.type='button';shareBtn.textContent='📤';
  shareBtn.style.cssText='padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:18px;cursor:pointer;';

      try{await navigator.share({title:'Wartungsprotokoll Flachdach',files:[file]});}
      catch(e){if(e.name!=='AbortError')toast('Teilen fehlgeschlagen','error');}
